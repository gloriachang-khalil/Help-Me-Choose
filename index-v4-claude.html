<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Me Choose</title>
  <style>
    :root{
      --bg:#FFFFFF;
      --text:#1D1D1F;
      --muted:#6E6E73;
      --gray:#F5F5F7;
      --blue:#0071E3;
      --border: rgba(0,0,0,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow-soft: 0 6px 18px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit}
    .app{
      min-height:100%;
      display:flex;
      justify-content:center;
      padding:20px 14px 40px;
    }
    .shell{
      width:100%;
      max-width:560px;
      margin:0 auto;
    }
    .top{
      position:sticky;
      top:0;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      padding:12px 0 10px;
      z-index:10;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 6px 10px;
    }
    .brand .name{font-weight:600;letter-spacing:.2px;font-size:14px;color:rgba(29,29,31,.9)}
    .brand .chip{font-size:12px;color:var(--muted);background:var(--gray);border:1px solid var(--border);padding:6px 10px;border-radius:999px;white-space:nowrap}
    .progress{height:6px;background:rgba(0,0,0,.06);border-radius:999px;overflow:hidden;margin:0 6px}
    .progress > div{height:100%;width:0%;background:var(--blue);border-radius:999px;transition:width .35s ease}
    .stage{position:relative;padding-top:10px}
    .screen{display:none;opacity:0;transform:translateY(6px);transition:opacity .3s ease,transform .3s ease;padding:12px 6px 0}
    .screen.active{display:block}
    .screen.visible{opacity:1;transform:translateY(0)}
    .screen.result-animate{transform:translateY(18px);transition:opacity .3s ease,transform .4s ease}

    h1{margin:8px 0 10px;font-size:34px;line-height:1.12;letter-spacing:-0.02em}
    h2{margin:6px 0 10px;font-size:22px;letter-spacing:-0.01em}
    p{margin:0 0 18px;color:var(--muted);line-height:1.55}

    .cardGrid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:10px}
    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px 16px;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .card:hover{transform:translateY(-1px);box-shadow:var(--shadow);border-color:rgba(0,0,0,.12)}
    .card:active{transform:translateY(0);box-shadow:var(--shadow-soft)}
    .cardTitle{font-weight:700;font-size:18px;letter-spacing:-0.01em;margin:0 0 6px}
    .cardDesc{margin:0;color:var(--muted);font-size:14px;line-height:1.5}
    .cardMeta{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;font-size:12px;color:rgba(29,29,31,.85);background:var(--gray);border:1px solid var(--border);white-space:nowrap}
    .arrow{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(0,113,227,.10);color:var(--blue);border:1px solid rgba(0,113,227,.18);flex:0 0 auto}

    .hero{background:linear-gradient(180deg,rgba(245,245,247,.9),rgba(255,255,255,1));border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);padding:20px 16px;box-shadow:var(--shadow-soft)}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{height:48px;padding:0 16px;border-radius:999px;border:1px solid transparent;font-weight:600;font-size:14px;letter-spacing:.2px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s ease,box-shadow .12s ease,background .12s ease,border-color .12s ease}
    .btn:active{transform:translateY(1px)}
    .btnPrimary{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(0,113,227,.18)}
    .btnPrimary:hover{box-shadow:0 12px 28px rgba(0,113,227,.22)}
    .btnSecondary{background:#fff;color:var(--text);border-color:rgba(0,0,0,.14);box-shadow:var(--shadow-soft)}
    .btnSecondary:hover{border-color:rgba(0,0,0,.18);box-shadow:var(--shadow)}
    .btnGhost{background:transparent;color:var(--text);border-color:rgba(0,0,0,.10)}
    .btnGhost:hover{border-color:rgba(0,0,0,.16);background:rgba(0,0,0,.02)}
    .btnFull{flex:1 1 180px}

    .resultHeader{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .resultStack{display:grid;gap:12px}
    .bigCard{padding:18px 16px}
    .bigTitle{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
    .productName{font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0}
    .price{font-size:14px;font-weight:700;color:rgba(29,29,31,.86);background:var(--gray);border:1px solid var(--border);padding:8px 10px;border-radius:999px;white-space:nowrap}
    .bullets{margin:10px 0 0;padding-left:18px;color:rgba(29,29,31,.88);line-height:1.6;font-size:14px}
    .why{margin-top:12px;padding:12px 12px;background:rgba(0,113,227,.06);border:1px solid rgba(0,113,227,.14);border-radius:14px;color:rgba(29,29,31,.9);line-height:1.55;font-size:14px}
    .subCards{display:grid;grid-template-columns:1fr;gap:10px}
    .mini{padding:14px 14px;box-shadow:none;cursor:default}
    .mini:hover{transform:none;box-shadow:none}
    .miniTitle{margin:0;font-weight:800;letter-spacing:-0.01em;font-size:15px}
    .miniDesc{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .miniFooter{margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .sectionTitle{margin:18px 0 10px;font-size:15px;font-weight:800;letter-spacing:-0.01em;color:rgba(29,29,31,.92)}

    /* V4 新增：升级洞察卡片 */
    .insightCard{margin-top:12px;padding:12px 14px;background:rgba(255,149,0,.07);border:1px solid rgba(255,149,0,.22);border-radius:14px;font-size:13px;line-height:1.55;color:rgba(29,29,31,.9)}
    .insightCard strong{color:rgba(200,100,0,.9)}

    .compareWrap{overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .35s ease,opacity .25s ease,transform .25s ease}
    .compareWrap.open{opacity:1;transform:translateY(0);max-height:800px}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:var(--radius);border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft)}
    th,td{text-align:left;padding:12px 12px;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:top;font-size:13px;line-height:1.45}
    th{background:var(--gray);font-weight:800;letter-spacing:-0.01em;color:rgba(29,29,31,.9)}
    tr:last-child td{border-bottom:none}
    .footerLink{margin-top:18px;display:inline-block;color:rgba(0,113,227,.95);text-decoration:none;font-weight:600;padding:8px 4px}
    .footerLink:hover{text-decoration:underline}

    .modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
    .modalOverlay.show{display:flex}
    .modal{width:100%;max-width:520px;background:#fff;border-radius:22px;border:1px solid rgba(255,255,255,.6);box-shadow:0 24px 70px rgba(0,0,0,.25);overflow:hidden;transform:translateY(10px);opacity:0;transition:transform .22s ease,opacity .22s ease}
    .modalOverlay.show .modal{transform:translateY(0);opacity:1}
    .modalHead{padding:14px 16px;background:rgba(245,245,247,.92);border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .modalTitle{font-weight:800;letter-spacing:-0.01em;font-size:14px;margin:0}
    .iconBtn{width:36px;height:36px;border-radius:999px;border:1px solid rgba(0,0,0,.10);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s ease,border-color .12s ease}
    .iconBtn:hover{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.14)}
    .modalBody{padding:14px 16px 16px}
    .textarea{width:100%;min-height:120px;padding:12px 12px;border-radius:16px;border:1px solid rgba(0,0,0,.12);background:#fff;font-size:13px;line-height:1.55;color:rgba(29,29,31,.92);resize:vertical;outline:none}
    .hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.45}

    @media (min-width: 740px){
      .app{padding:28px 18px 60px}
      .cardGrid{grid-template-columns:1fr 1fr 1fr}
      .subCards{grid-template-columns:1fr 1fr}
      h1{font-size:40px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="shell" role="application" aria-label="Help Me Choose">
    <div class="top">
      <div class="brand">
        <div class="name">Help Me Choose</div>
        <div class="chip" id="chipStatus">准备开始</div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>

    <main class="stage">
      <!-- 欢迎页 -->
      <section class="screen" id="screen-welcome">
        <div class="hero">
          <h1>Help Me Choose</h1>
          <p>告诉我你现在的情况，我来帮你选最适合你的那款</p>
          <div class="btnRow">
            <button class="btn btnPrimary btnFull" id="btnStart">开始选购</button>
          </div>
        </div>
      </section>

      <!-- Q1: 品类 -->
      <section class="screen" id="screen-q1">
        <h2>你现在更想买哪类产品？</h2>
        <p>选一个方向，我们根据你的真实情况来推荐最适合的款式。</p>
        <div class="cardGrid" id="q1Grid"></div>
      </section>

      <!-- Q2: 预算状态 -->
      <section class="screen" id="screen-q2">
        <h2 id="q2Title"></h2>
        <p id="q2Hint"></p>
        <div class="cardGrid" id="q2Grid"></div>
      </section>

      <!-- Q3: 分支问题 -->
      <section class="screen" id="screen-q3">
        <h2 id="q3Title"></h2>
        <p id="q3Hint"></p>
        <div class="cardGrid" id="q3Grid"></div>
      </section>

      <!-- Q4: 分支问题 -->
      <section class="screen" id="screen-q4">
        <h2 id="q4Title"></h2>
        <p id="q4Hint"></p>
        <div class="cardGrid" id="q4Grid"></div>
      </section>

      <!-- 结果页 -->
      <section class="screen result-animate" id="screen-result">
        <div class="resultHeader">
          <h2 style="margin:0">这是为你挑选的推荐</h2>
          <p id="resultSub" style="margin:0"></p>
        </div>
        <div class="resultStack">
          <!-- 主推 -->
          <div class="card bigCard" id="primaryCard" style="cursor:default">
            <div class="bigTitle">
              <div>
                <p class="pill" id="reasonTag" style="margin:0 0 10px;display:inline-flex"></p>
                <p class="productName" id="primaryName"></p>
              </div>
              <div class="price" id="primaryPrice"></div>
            </div>
            <ul class="bullets" id="primaryBullets"></ul>
            <div class="why" id="primaryWhy"></div>
          </div>

          <!-- V4新增：升级洞察（仅iPhone分支显示） -->
          <div id="insightWrap" style="display:none">
            <div class="insightCard" id="insightText"></div>
          </div>

          <!-- 备选 -->
          <div>
            <div class="sectionTitle">备选款</div>
            <div class="subCards">
              <div class="card mini" id="altCard">
                <p class="miniTitle" id="altName"></p>
                <p class="miniDesc" id="altDiff"></p>
                <div class="miniFooter">
                  <span class="pill">备选价格</span>
                  <span class="price" id="altPrice"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- 配件 -->
          <div>
            <div class="sectionTitle">搭配推荐</div>
            <div class="subCards" id="accessoryGrid"></div>
          </div>

          <!-- CTA -->
          <div>
            <div class="sectionTitle">下一步</div>
            <div class="btnRow">
              <button class="btn btnPrimary btnFull" id="btnStore">在 Apple Store 查看</button>
              <button class="btn btnSecondary btnFull" id="btnCompare">对比主推 vs 备选</button>
              <button class="btn btnGhost btnFull" id="btnSave">保存这套推荐</button>
            </div>
          </div>

          <!-- 对比表 -->
          <div class="compareWrap" id="compareWrap">
            <div style="height:10px"></div>
            <table id="compareTable">
              <thead>
                <tr>
                  <th style="width:26%">项目</th>
                  <th id="thPrimary" style="width:37%">主推</th>
                  <th id="thAlt" style="width:37%">备选</th>
                </tr>
              </thead>
              <tbody id="compareBody"></tbody>
            </table>
          </div>

          <a class="footerLink" href="#" id="linkRestart">重新来过</a>
        </div>
      </section>
    </main>
  </div>
</div>

<!-- 保存弹窗 -->
<div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modalHead">
      <p class="modalTitle">可复制的推荐摘要</p>
      <button class="iconBtn" id="btnCloseModal">×</button>
    </div>
    <div class="modalBody">
      <textarea class="textarea" id="saveText" readonly></textarea>
      <div class="btnRow" style="margin-top:12px">
        <button class="btn btnPrimary btnFull" id="btnCopy">复制摘要</button>
        <button class="btn btnSecondary btnFull" id="btnSelectAll">全选</button>
      </div>
      <p class="hint">提示：你也可以直接长按文本进行复制。</p>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = sel => document.querySelector(sel);
  const el = {
    chipStatus: $("#chipStatus"),
    progressBar: $("#progressBar"),
    screens: {
      welcome: $("#screen-welcome"),
      q1: $("#screen-q1"),
      q2: $("#screen-q2"),
      q3: $("#screen-q3"),
      q4: $("#screen-q4"),
      result: $("#screen-result"),
    },
    btnStart: $("#btnStart"),
    q1Grid: $("#q1Grid"),
    q2Title: $("#q2Title"), q2Hint: $("#q2Hint"), q2Grid: $("#q2Grid"),
    q3Title: $("#q3Title"), q3Hint: $("#q3Hint"), q3Grid: $("#q3Grid"),
    q4Title: $("#q4Title"), q4Hint: $("#q4Hint"), q4Grid: $("#q4Grid"),
    resultSub: $("#resultSub"),
    reasonTag: $("#reasonTag"),
    primaryName: $("#primaryName"),
    primaryPrice: $("#primaryPrice"),
    primaryBullets: $("#primaryBullets"),
    primaryWhy: $("#primaryWhy"),
    insightWrap: $("#insightWrap"),
    insightText: $("#insightText"),
    altName: $("#altName"), altDiff: $("#altDiff"), altPrice: $("#altPrice"),
    accessoryGrid: $("#accessoryGrid"),
    btnStore: $("#btnStore"),
    btnCompare: $("#btnCompare"),
    compareWrap: $("#compareWrap"),
    compareBody: $("#compareBody"),
    thPrimary: $("#thPrimary"), thAlt: $("#thAlt"),
    btnSave: $("#btnSave"),
    linkRestart: $("#linkRestart"),
    modalOverlay: $("#modalOverlay"),
    btnCloseModal: $("#btnCloseModal"),
    saveText: $("#saveText"),
    btnCopy: $("#btnCopy"),
    btnSelectAll: $("#btnSelectAll"),
  };

  const state = {
    step: "welcome",
    branch: null,
    answers: { q1: null, q2: null, q3: null, q4: null },
    compareOpen: false,
    matched: null,
  };

  // ─── 通用预算倾向 Q2 ───
  const BUDGET_Q = {
    title: "这次你更接近哪种预算状态？",
    hint: "这会直接影响我们推荐更克制、均衡，还是一步到位的路线。",
    options: [
      { label: "控制预算，够用就好",       desc: "更偏性价比路线，不为用不到的功能多花钱。" },
      { label: "预算中间档，想买得均衡",   desc: "想在体验与价格之间找到更踏实的平衡点。" },
      { label: "愿意多花一点，换更完整体验", desc: "不介意多花一些，希望关键体验更齐全。" },
      { label: "预算基本不设限，想一步到位", desc: "减少后悔成本，直接选最适合自己的高配路线。" },
    ],
  };

  // ══════════════════════════════════════════════════════════
  // iPhone 分支 — V4 重新设计
  // Q3: 你现在用的是什么手机？（升级起点）
  // Q4: 这次换机最主要是因为？（升级动机）
  // ══════════════════════════════════════════════════════════
  const IPHONE = {
    label: "iPhone",
    desc: "想换一台更适合你的手机",
    q3: {
      title: "你现在用的是什么手机？",
      hint: "告诉我你的起点，我才能判断这次升级对你来说值不值、该怎么选。",
      options: [
        { label: "安卓手机 / 第一次用 iPhone", desc: "全新进入苹果生态，没有历史包袱。" },
        { label: "iPhone 13 或更早款（2021年及之前）", desc: "已经用了 3 年以上，升级空间很大。" },
        { label: "iPhone 14 系列（2022年款）", desc: "用了约 2 年，看看有没有值得升级的理由。" },
        { label: "iPhone 15 系列（2023年款）", desc: "才用 1 年多，需要认真想想换机理由。" },
      ],
    },
    q4: {
      title: "这次换机最主要是因为？",
      hint: "这是最关键的一步——换机动机决定了哪款真正值得推荐给你。",
      options: [
        { label: "续航撑不住，每天要充好几次", desc: "续航是你现在最大的痛点。" },
        { label: "拍照效果不满意，想要更好画质", desc: "摄影升级是你最在意的。" },
        { label: "手机变慢变卡，用起来不流畅",   desc: "性能提升对你来说很重要。" },
        { label: "想体验新功能，或者是买来送人",  desc: "追新或送礼场景。" },
      ],
    },
    compareFields: ["价格", "屏幕尺寸", "芯片", "相机能力", "存储版本", "电池容量/续航", "适合人群"],

    // ── 规则表（优先级：特异性越高，得分越高；越靠前的规则在同分时优先） ──
    // 字段说明：tilt=预算状态，prev=上一台机型，reason=换机原因
    rules: [

      // ─── 安卓 / 新用户 ───────────────────────────────────
      {
        id: "ip-android-budget",
        match: { tilt: "控制预算，够用就好", prev: "安卓手机 / 第一次用 iPhone", reason: "*" },
        primary: { name: "iPhone 16 128GB", price: "RMB 5999 起",
          bullets: ["A18 芯片性能远超安卓同价位旗舰", "进入苹果生态最合理的起点", "无需为你暂时用不到的 Pro 功能多花钱"] },
        alt: { name: "iPhone 15 128GB", price: "RMB 4999 起",
          diff: "更省钱的入门选择；如果你的预算真的很紧，15 也能让你完整体验苹果生态" },
        tag: "生态入门首选",
        insight: "从安卓换过来，16 标准版的 A18 芯片和系统流畅度已经远超安卓同价位旗舰。暂时不需要 Pro。",
        accessories: [
          { name: "透明 MagSafe 保护壳", why: "新手机第一步，保护壳不能少，透明款不挡颜色" },
          { name: "编织 USB-C 数据线", why: "换了苹果就换 USB-C，编织款更耐用" },
        ],
        compare: {
          "价格": ["RMB 5999 起", "RMB 4999 起"],
          "屏幕尺寸": ["6.1 寸", "6.1 寸"],
          "芯片": ["A18（更新一代）", "A16（上上代，仍够用）"],
          "相机能力": ["4800 万主摄，日常更清晰", "4800 万主摄，略偏旧但够用"],
          "存储版本": ["128GB", "128GB"],
          "电池容量/续航": ["约 3561 mAh｜全天续航", "约 3349 mAh｜日常够用"],
          "适合人群": ["想要最新一代体验的新用户", "预算极度有限、只想进生态"],
        },
      },
      {
        id: "ip-android-balanced",
        match: { tilt: "预算中间档，想买得均衡", prev: "安卓手机 / 第一次用 iPhone", reason: "*" },
        primary: { name: "iPhone 16 256GB", price: "RMB 6499 起",
          bullets: ["256GB 容量未来几年不会焦虑", "A18 芯片保证长线流畅体验", "进入苹果生态最稳妥的均衡选择"] },
        alt: { name: "iPhone 16 128GB", price: "RMB 5999 起",
          diff: "省 500 元的选择；128GB 对大多数用户够用，看你日常存储习惯" },
        tag: "生态入门均衡款",

          diff: "如果你主要在桌面长时间听音，且不需要随身携带，Max 更沉浸" },
        tag: "一步到位",

          "佩戴形式": ["入耳式（便携）", "头戴式（沉浸）"],

          "连接场景": ["通勤/办公/日常全能", "更适合桌面固定场景"],

          "适合人群": ["随身全能一副解决", "预算充足、追求沉浸感"],
        },

  };

  const PRODUCTS = {
    iphone:  IPHONE,
    macbook: MACBOOK,
    airpods: AIRPODS,
  };

  // ══════════════════════════════════════════════════════════
  // 推荐匹配引擎
  // ══════════════════════════════════════════════════════════
  function matchVal(ruleVal, actual) {
    if (ruleVal === "*" || ruleVal === undefined || ruleVal === null) return { match: true, score: 0 };
    if (Array.isArray(ruleVal)) {
      return ruleVal.includes(actual) ? { match: true, score: 2 } : { match: false, score: 0 };
    }
    return ruleVal === actual ? { match: true, score: 4 } : { match: false, score: 0 };
  }

  function matchRule(rule, branch, tilt, q3val, q4val) {
    const m = rule.match || {};
    let totalScore = 0;
    let ok = true;

    // tilt
    const t = matchVal(m.tilt, tilt);
    if (!t.match) { ok = false; }
    totalScore += t.score * 2; // tilt 权重加倍

    if (branch === "iphone") {
      const p = matchVal(m.prev, q3val);
      const r = matchVal(m.reason, q4val);
      if (!p.match || !r.match) ok = false;
      totalScore += p.score + r.score;
    } else if (branch === "macbook") {
      const u = matchVal(m.usage, q3val);
      const pr = matchVal(m.pref, q4val);
      if (!u.match || !pr.match) ok = false;
      totalScore += u.score + pr.score;
    } else {
      const s = matchVal(m.scene, q3val);
      const pr = matchVal(m.pref, q4val);
      if (!s.match || !pr.match) ok = false;
      totalScore += s.score + pr.score;
    }

    return { ok, score: totalScore };
  }

  function matchRecommendation() {
    const branch = state.branch;
    const b = PRODUCTS[branch];
    const tilt = state.answers.q2;
    const q3 = state.answers.q3;
    const q4 = state.answers.q4;

    let best = null;
    let bestScore = -1;

    for (const rule of b.rules) {
      const { ok, score } = matchRule(rule, branch, tilt, q3, q4);
      if (ok && score > bestScore) {
        bestScore = score;
        best = rule;
      }
    }

    const picked = best || b.rules[b.rules.length - 1];
    const why = buildWhy(branch, tilt, q3, q4, picked);

    return { branch, tilt, q3, q4, primary: picked.primary, alt: picked.alt, tag: picked.tag,
      insight: picked.insight || null,
      accessories: picked.accessories || [],
      compareFields: b.compareFields, compare: picked.compare || {}, why };
  }

  function buildWhy(branch, tilt, q3, q4, rule) {
    const budgetLine = {
      "控制预算，够用就好":         "因为你选择了「控制预算，够用就好」，我们优先推荐性价比更高的路线。",
      "预算中间档，想买得均衡":     "因为你想「预算均衡」，我们选了体验与价格最平衡的方案。",
      "愿意多花一点，换更完整体验": "因为你愿意多花一点，我们把体验关键点补齐了，减少使用中的妥协感。",
      "预算基本不设限，想一步到位": "因为你想「一步到位」，我们选了最完整的路线，减少后悔成本。",
    }[tilt] || "基于你的整体选择，";

    let detail = "";
    if (branch === "iphone") {
      if (q3) detail += `你目前用的是${q3}`;
      if (q4) detail += `，换机主要原因是「${q4}」`;
    } else if (branch === "macbook") {
      if (q3) detail += `你主要用于${q3}`;
      if (q4) detail += `，更看重「${q4}」`;
    } else {
      if (q3) detail += `你主要在「${q3}」使用`;
      if (q4) detail += `，最在意「${q4}」`;
    }

    return `${budgetLine}${detail ? detail + `，因此 ${rule.primary.name} 更贴合你当下的需求。` : `因此 ${rule.primary.name} 是最适合你的选择。`}`;
  }

  // ══════════════════════════════════════════════════════════
  // UI 渲染
  // ══════════════════════════════════════════════════════════
  const STEPS = {
    welcome: { progress: 0,   chip: "准备开始" },
    q1:      { progress: 20,  chip: "第 1/4 步" },
    q2:      { progress: 45,  chip: "第 2/4 步" },
    q3:      { progress: 70,  chip: "第 3/4 步" },
    q4:      { progress: 90,  chip: "第 4/4 步" },
    result:  { progress: 100, chip: "推荐已生成" },
  };

  function esc(s) {
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
  }

  function cardHTML(title, desc, metaLabel) {
    return `<div class="card" role="button" tabindex="0" aria-label="${esc(title)}">
      <div class="cardTitle">${esc(title)}</div>
      <p class="cardDesc">${esc(desc || "")}</p>
      <div class="cardMeta"><span class="pill">${esc(metaLabel || "选择")}</span><span class="arrow" aria-hidden="true">→</span></div>
    </div>`;
  }

  function bindCards(container, onPick) {
    container.onclick = e => {
      const c = e.target.closest(".card");
      if (!c || !container.contains(c)) return;
      onPick([...container.querySelectorAll(".card")].indexOf(c));
    };
    container.onkeydown = e => {
      if (e.key !== "Enter" && e.key !== " ") return;
      const c = e.target.closest(".card");
      if (!c || !container.contains(c)) return;
      e.preventDefault();
      onPick([...container.querySelectorAll(".card")].indexOf(c));
    };
  }

  function showScreen(key, isResult = false) {
    state.step = key;
    const s = STEPS[key] || STEPS.welcome;
    el.progressBar.style.width = s.progress + "%";
    el.chipStatus.textContent = s.chip;
    Object.entries(el.screens).forEach(([k, node]) => {
      if (!node) return;
      if (k === key) { node.classList.add("active"); }
      else { node.classList.remove("visible","active"); }
    });
    const node = el.screens[key];
    if (!node) return;
    if (isResult) node.classList.add("result-animate");
    requestAnimationFrame(() => {
      node.classList.add("visible");
      if (isResult) requestAnimationFrame(() => node.classList.remove("result-animate"));
    });
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderQ1() {
    el.q1Grid.innerHTML = [
      { key: "iphone",  p: IPHONE  },
      { key: "macbook", p: MACBOOK },
      { key: "airpods", p: AIRPODS },
    ].map(x => cardHTML(x.p.label, x.p.desc, "选择品类")).join("");
    bindCards(el.q1Grid, idx => {
      const keys = ["iphone","macbook","airpods"];
      state.branch = keys[idx];
      state.answers = { q1: PRODUCTS[keys[idx]].label, q2: null, q3: null, q4: null };
      state.compareOpen = false;
      el.compareWrap.classList.remove("open");
      renderQ2();
      showScreen("q2");
    });
  }

  function renderQ2() {
    el.q2Title.textContent = BUDGET_Q.title;
    el.q2Hint.textContent = BUDGET_Q.hint;
    el.q2Grid.innerHTML = BUDGET_Q.options.map(o => cardHTML(o.label, o.desc, "单选")).join("");
    bindCards(el.q2Grid, idx => {
      state.answers.q2 = BUDGET_Q.options[idx].label;
      renderQ3();
      showScreen("q3");
    });
  }

  function renderQ3() {
    const q = PRODUCTS[state.branch].q3;
    el.q3Title.textContent = q.title;
    el.q3Hint.textContent = q.hint;
    el.q3Grid.innerHTML = q.options.map(o => cardHTML(o.label, o.desc, "单选")).join("");
    bindCards(el.q3Grid, idx => {
      state.answers.q3 = q.options[idx].label;
      renderQ4();
      showScreen("q4");
    });
  }

  function renderQ4() {
    const q = PRODUCTS[state.branch].q4;
    el.q4Title.textContent = q.title;
    el.q4Hint.textContent = q.hint;
    el.q4Grid.innerHTML = q.options.map(o => cardHTML(o.label, o.desc, "单选")).join("");
    bindCards(el.q4Grid, idx => {
      state.answers.q4 = q.options[idx].label;
      const matched = matchRecommendation();
      state.matched = matched;
      renderResult(matched);
      showScreen("result", true);
    });
  }

  function renderResult(m) {
    el.resultSub.textContent = `基于你的选择（${m.tilt}），我们为你整理了最适合的主推、备选与搭配建议。`;
    el.reasonTag.textContent = m.tag ? `推荐理由：${m.tag}` : "推荐理由";
    el.primaryName.textContent = m.primary.name;
    el.primaryPrice.textContent = m.primary.price;
    el.primaryBullets.innerHTML = (m.primary.bullets || []).map(x => `<li>${esc(x)}</li>`).join("");
    el.primaryWhy.textContent = m.why;

    // 升级洞察（仅 iPhone 分支，且 insight 存在时显示）
    if (m.insight && m.branch === "iphone") {
      el.insightWrap.style.display = "";
      el.insightText.innerHTML = `<strong>💡 升级洞察：</strong>${esc(m.insight)}`;
    } else {
      el.insightWrap.style.display = "none";
    }

    el.altName.textContent = m.alt.name;
    el.altPrice.textContent = m.alt.price;
    el.altDiff.textContent = m.alt.diff;

    el.accessoryGrid.innerHTML = (m.accessories || []).slice(0, 3).map(a =>
      `<div class="card mini"><p class="miniTitle">${esc(a.name)}</p><p class="miniDesc">${esc(a.why)}</p></div>`
    ).join("");

    // 对比表
    if (el.thPrimary) el.thPrimary.textContent = m.primary.name;
    if (el.thAlt) el.thAlt.textContent = m.alt.name;
    el.compareBody.innerHTML = (m.compareFields || []).map(f => {
      const row = m.compare?.[f] || ["—","—"];
      return `<tr><td><strong>${esc(f)}</strong></td><td>${esc(row[0]??'—')}</td><td>${esc(row[1]??'—')}</td></tr>`;
    }).join("");

    state.compareOpen = false;
    el.compareWrap.classList.remove("open");
    el.btnCompare.textContent = "对比主推 vs 备选";
  }

  function buildSaveSummary(m) {
    return `【Help Me Choose 推荐摘要】\n\n主推：${m.primary.name}（${m.primary.price}）\n备选：${m.alt.name}（${m.alt.price}）\n\n推荐理由：${m.why}\n\n搭配推荐：${(m.accessories||[]).map(x=>x.name).join('、')}\n\n--- 在 Apple Store 查看主推款 ---`;
  }

  // ── 事件绑定 ──
  el.btnStart.addEventListener("click", () => { renderQ1(); showScreen("q1"); });

  el.btnStore.addEventListener("click", () => {
    const name = state.matched?.primary?.name || "";
    const urls = {
      "iPhone": "https://www.apple.com.cn/shop/buy-iphone",
      "MacBook": "https://www.apple.com.cn/shop/buy-mac",
      "AirPods": "https://www.apple.com.cn/shop/buy-airpods",
    };
    const url = Object.entries(urls).find(([k]) => name.toLowerCase().includes(k.toLowerCase()))?.[1]
      || "https://www.apple.com.cn/store";
    window.open(url, "_blank");
  });

  el.btnCompare.addEventListener("click", () => {
    state.compareOpen = !state.compareOpen;
    el.compareWrap.classList.toggle("open", state.compareOpen);
    el.btnCompare.textContent = state.compareOpen ? "收起对比" : "对比主推 vs 备选";
  });

  el.btnSave.addEventListener("click", () => {
    if (!state.matched) return;
    el.saveText.value = buildSaveSummary(state.matched);
    el.modalOverlay.classList.add("show");
    setTimeout(() => { el.saveText.focus(); el.saveText.select(); }, 50);
  });

  el.linkRestart.addEventListener("click", e => {
    e.preventDefault();
    state.step = "welcome"; state.branch = null;
    state.answers = { q1:null, q2:null, q3:null, q4:null };
    state.compareOpen = false; state.matched = null;
    el.compareWrap.classList.remove("open");
    showScreen("welcome");
  });

  el.btnCloseModal.addEventListener("click", () => el.modalOverlay.classList.remove("show"));
  el.modalOverlay.addEventListener("click", e => { if (e.target === el.modalOverlay) el.modalOverlay.classList.remove("show"); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") el.modalOverlay.classList.remove("show"); });

  el.btnSelectAll.addEventListener("click", () => { el.saveText.focus(); el.saveText.select(); });
  el.btnCopy.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(el.saveText.value); }
    catch { el.saveText.focus(); el.saveText.select(); document.execCommand("copy"); }
    el.btnCopy.textContent = "已复制 ✓";
    setTimeout(() => el.btnCopy.textContent = "复制摘要", 1200);
  });

  // Init
  showScreen("welcome");
})();
