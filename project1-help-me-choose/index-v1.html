<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Me Choose</title>
  <style>
    :root{
      --bg:#FFFFFF;
      --text:#1D1D1F;
      --muted:#6E6E73;
      --gray:#F5F5F7;
      --blue:#0071E3;
      --border: rgba(0,0,0,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow-soft: 0 6px 18px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{color:inherit}
    .app{
      min-height:100%;
      display:flex;
      justify-content:center;
      padding:20px 14px 40px;
    }
    .shell{
      width:100%;
      max-width: 560px;
      margin:0 auto;
    }
    .top{
      position:sticky;
      top:0;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding:12px 0 10px;
      z-index:10;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 0 6px 10px;
    }
    .brand .name{
      font-weight:600;
      letter-spacing:.2px;
      font-size:14px;
      color: rgba(29,29,31,.9);
    }
    .brand .chip{
      font-size:12px;
      color: var(--muted);
      background: var(--gray);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .progress{
      height: 6px;
      background: rgba(0,0,0,.06);
      border-radius: 999px;
      overflow:hidden;
      margin: 0 6px;
    }
    .progress > div{
      height:100%;
      width:0%;
      background: var(--blue);
      border-radius:999px;
      transition: width .35s ease;
    }
    .stage{
      position:relative;
      padding-top: 10px;
    }
    .screen{
      display:none;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .3s ease, transform .3s ease;
      padding: 12px 6px 0;
    }
    .screen.active{
      display:block;
    }
    .screen.visible{
      opacity:1;
      transform: translateY(0);
    }
    .screen.result-animate{
      transform: translateY(18px);
      transition: opacity .3s ease, transform .4s ease;
    }

    h1{
      margin: 8px 0 10px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: -0.02em;
    }
    h2{
      margin: 6px 0 10px;
      font-size: 22px;
      letter-spacing: -0.01em;
    }
    p{
      margin: 0 0 18px;
      color: var(--muted);
      line-height:1.55;
    }

    .cardGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .card{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px;
      box-shadow: var(--shadow-soft);
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: rgba(0,0,0,.12);
    }
    .card:active{
      transform: translateY(0);
      box-shadow: var(--shadow-soft);
    }
    .cardTitle{
      font-weight:700;
      font-size: 18px;
      letter-spacing: -0.01em;
      margin: 0 0 6px;
    }
    .cardDesc{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .cardMeta{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(29,29,31,.85);
      background: var(--gray);
      border: 1px solid var(--border);
      white-space:nowrap;
    }
    .arrow{
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,113,227,.10);
      color: var(--blue);
      border:1px solid rgba(0,113,227,.18);
      flex: 0 0 auto;
    }

    .hero{
      background: linear-gradient(180deg, rgba(245,245,247,.9), rgba(255,255,255,1));
      border:1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 20px 16px;
      box-shadow: var(--shadow-soft);
    }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 14px;
    }
    .btn{
      height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .2px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btnPrimary{
      background: var(--blue);
      color:#fff;
      box-shadow: 0 10px 24px rgba(0,113,227,.18);
    }
    .btnPrimary:hover{box-shadow: 0 12px 28px rgba(0,113,227,.22)}
    .btnSecondary{
      background: #fff;
      color: var(--text);
      border-color: rgba(0,0,0,.14);
      box-shadow: var(--shadow-soft);
    }
    .btnSecondary:hover{border-color: rgba(0,0,0,.18); box-shadow: var(--shadow)}
    .btnGhost{
      background: transparent;
      color: var(--text);
      border-color: rgba(0,0,0,.10);
    }
    .btnGhost:hover{border-color: rgba(0,0,0,.16); background: rgba(0,0,0,.02)}
    .btnFull{flex:1 1 180px}

    .resultHeader{
      display:flex;
      flex-direction:column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .resultStack{
      display:grid;
      gap: 12px;
    }
    .bigCard{
      padding: 18px 16px;
    }
    .bigTitle{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom: 10px;
    }
    .productName{
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin:0;
    }
    .price{
      font-size: 14px;
      font-weight: 700;
      color: rgba(29,29,31,.86);
      background: var(--gray);
      border:1px solid var(--border);
      padding: 8px 10px;
      border-radius: 999px;
      white-space:nowrap;
    }
    .bullets{
      margin: 10px 0 0;
      padding-left: 18px;
      color: rgba(29,29,31,.88);
      line-height:1.6;
      font-size: 14px;
    }
    .why{
      margin-top: 12px;
      padding: 12px 12px;
      background: rgba(0,113,227,.06);
      border: 1px solid rgba(0,113,227,.14);
      border-radius: 14px;
      color: rgba(29,29,31,.9);
      line-height:1.55;
      font-size: 14px;
    }
    .subCards{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .mini{
      padding: 14px 14px;
      box-shadow: none;
      cursor: default;
    }
    .mini:hover{transform:none; box-shadow:none}
    .miniTitle{
      margin:0;
      font-weight: 800;
      letter-spacing:-0.01em;
      font-size: 15px;
    }
    .miniDesc{
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .miniFooter{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .sectionTitle{
      margin: 18px 0 10px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing:-0.01em;
      color: rgba(29,29,31,.92);
    }
    .compareWrap{
      overflow:hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      transition: max-height .35s ease, opacity .25s ease, transform .25s ease;
    }
    .compareWrap.open{
      opacity: 1;
      transform: translateY(0);
      max-height: 800px;
    }
    table{
      width:100%;
      border-collapse: collapse;
      overflow:hidden;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background:#fff;
      box-shadow: var(--shadow-soft);
    }
    th,td{
      text-align:left;
      padding: 12px 12px;
      border-bottom:1px solid rgba(0,0,0,.06);
      vertical-align: top;
      font-size: 13px;
      line-height:1.45;
    }
    th{
      background: var(--gray);
      font-weight: 800;
      letter-spacing:-0.01em;
      color: rgba(29,29,31,.9);
    }
    tr:last-child td{border-bottom:none}
    .footerLink{
      margin-top: 18px;
      display:inline-block;
      color: rgba(0,113,227,.95);
      text-decoration:none;
      font-weight:600;
      padding: 8px 4px;
    }
    .footerLink:hover{text-decoration: underline}

    .modalOverlay{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 100;
    }
    .modalOverlay.show{display:flex}
    .modal{
      width:100%;
      max-width: 520px;
      background:#fff;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 24px 70px rgba(0,0,0,.25);
      overflow:hidden;
      transform: translateY(10px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
    }
    .modalOverlay.show .modal{
      transform: translateY(0);
      opacity: 1;
    }
    .modalHead{
      padding: 14px 16px;
      background: rgba(245,245,247,.92);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .modalTitle{
      font-weight:800;
      letter-spacing:-0.01em;
      font-size: 14px;
      margin:0;
    }
    .iconBtn{
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.10);
      background: #fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: background .12s ease, border-color .12s ease;
    }
    .iconBtn:hover{background: rgba(0,0,0,.02); border-color: rgba(0,0,0,.14)}
    .modalBody{
      padding: 14px 16px 16px;
    }
    .textarea{
      width:100%;
      min-height: 120px;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      font-size: 13px;
      line-height:1.55;
      color: rgba(29,29,31,.92);
      resize: vertical;
      outline:none;
    }
    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height:1.45;
    }

    @media (min-width: 740px){
      .app{padding: 28px 18px 60px}
      .cardGrid{grid-template-columns: 1fr 1fr 1fr}
      .subCards{grid-template-columns: 1fr 1fr}
      h1{font-size: 40px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell" role="application" aria-label="Help Me Choose">
      <div class="top" aria-hidden="false">
        <div class="brand">
          <div class="name">Help Me Choose</div>
          <div class="chip" id="chipStatus">准备开始</div>
        </div>
        <div class="progress" aria-label="进度">
          <div id="progressBar"></div>
        </div>
      </div>

      <main class="stage">
        <section class="screen" id="screen-welcome" aria-label="欢迎页">
          <div class="hero">
            <h1>Help Me Choose</h1>
            <p>告诉我你想买什么，我来帮你选对款</p>
            <div class="btnRow">
              <button class="btn btnPrimary btnFull" id="btnStart">开始选购</button>
            </div>
          </div>
        </section>

        <section class="screen" id="screen-q1" aria-label="Q1">
          <h2>你现在更想买哪类产品？</h2>
          <p>选一个方向，我们用 2 个问题把范围收敛到更合适的推荐。</p>
          <div class="cardGrid" id="q1Grid"></div>
        </section>

        <section class="screen" id="screen-q2" aria-label="Q2">
          <h2 id="q2Title"></h2>
          <p id="q2Hint"></p>
          <div class="cardGrid" id="q2Grid"></div>
        </section>

        <section class="screen" id="screen-q3" aria-label="Q3">
          <h2 id="q3Title"></h2>
          <p id="q3Hint"></p>
          <div class="cardGrid" id="q3Grid"></div>
        </section>

        <section class="screen result-animate" id="screen-result" aria-label="推荐结果页">
          <div class="resultHeader">
            <h2 style="margin:0">这是为你挑选的推荐</h2>
            <p id="resultSub" style="margin:0">基于你的答案，我们给出主推、备选与配件建议。</p>
          </div>

          <div class="resultStack">
            <div class="card bigCard" id="primaryCard" style="cursor:default">
              <div class="bigTitle">
                <div>
                  <p class="pill" id="reasonTag" style="margin:0 0 10px; display:inline-flex"></p>
                  <p class="productName" id="primaryName"></p>
                </div>
                <div class="price" id="primaryPrice"></div>
              </div>
              <ul class="bullets" id="primaryBullets"></ul>
              <div class="why" id="primaryWhy"></div>
            </div>

            <div>
              <div class="sectionTitle">备选款</div>
              <div class="subCards">
                <div class="card mini" id="altCard" aria-label="备选款">
                  <p class="miniTitle" id="altName"></p>
                  <p class="miniDesc" id="altDiff"></p>
                  <div class="miniFooter">
                    <span class="pill">备选价格</span>
                    <span class="price" id="altPrice"></span>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div class="sectionTitle">配件推荐</div>
              <div class="subCards" id="accessoryGrid"></div>
            </div>

            <div>
              <div class="sectionTitle">下一步</div>
              <div class="btnRow">
                <button class="btn btnPrimary btnFull" id="btnStore">在 Apple Store 查看</button>
                <button class="btn btnSecondary btnFull" id="btnCompare">对比主推 vs 备选</button>
                <button class="btn btnGhost btnFull" id="btnSave">保存这套推荐</button>
              </div>
            </div>

            <div class="compareWrap" id="compareWrap" aria-label="对比表">
              <div style="height:10px"></div>
              <table id="compareTable">
                <thead>
                  <tr>
                    <th style="width:26%">项目</th>
                    <th style="width:37%">主推</th>
                    <th style="width:37%">备选</th>
                  </tr>
                </thead>
                <tbody id="compareBody"></tbody>
              </table>
            </div>

            <a class="footerLink" href="#" id="linkRestart">重新来过</a>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="保存推荐摘要">
    <div class="modal">
      <div class="modalHead">
        <p class="modalTitle">可复制的推荐摘要</p>
        <button class="iconBtn" id="btnCloseModal" aria-label="关闭">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="modalBody">
        <textarea class="textarea" id="saveText" readonly></textarea>
        <div class="btnRow" style="margin-top:12px">
          <button class="btn btnPrimary btnFull" id="btnCopy">复制摘要</button>
          <button class="btn btnSecondary btnFull" id="btnSelectAll">全选</button>
        </div>
        <p class="hint">提示：你也可以直接长按文本进行复制。</p>
      </div>
    </div>
  </div>

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")

        state.step = key;

        Object.entries(el.screens).forEach(([k, node]) => {
          if (!node) return;
          if (k === key) {
            node.classList.add("active");
          } else {
            node.classList.remove("visible");
            node.classList.remove("active");
          }
        });

        const node = el.screens[key];
        if (!node) return;
        if (isResult) node.classList.add("result-animate");
        requestAnimationFrame(() => {
          node.classList.add("visible");
          if (isResult) {
            requestAnimationFrame(() => node.classList.remove("result-animate"));
          }
        });
      }

      function card({ title, desc, meta }) {
        const metaLeft = meta?.left ? `<span class="pill">${escapeHtml(meta.left)}</span>` : `<span class="pill">轻点选择</span>`;
        const metaRight = `<span class="arrow" aria-hidden="true">→</span>`;
        return `
          <div class="card" role="button" tabindex="0" aria-label="${escapeHtml(title)}">
            <div class="cardTitle">${escapeHtml(title)}</div>
            <p class="cardDesc">${escapeHtml(desc || "")}</p>
            <div class="cardMeta">
              ${metaLeft}
              ${metaRight}
            </div>
          </div>
        `;
      }

      function wireCardActivate(container, onPick) {
        container.addEventListener("click", (e) => {
          const c = e.target.closest(".card");
          if (!c || !container.contains(c)) return;
          const idx = [...container.querySelectorAll(".card")].indexOf(c);
          if (idx >= 0) onPick(idx);
        });
        container.addEventListener("keydown", (e) => {
          if (e.key !== "Enter" && e.key !== " ") return;
          const c = e.target.closest(".card");
          if (!c || !container.contains(c)) return;
          e.preventDefault();
          const idx = [...container.querySelectorAll(".card")].indexOf(c);
          if (idx >= 0) onPick(idx);
        });
      }

      function normalizeMatchValue(v) {
        if (v === "*") return { any: true, list: null, value: null };
        if (Array.isArray(v)) return { any: false, list: v, value: null };
        return { any: false, list: null, value: v };
      }

      function ruleScore(rule) {
        // More specific wins: each non-* match adds points; array matches add slightly less than exact.
        const m = rule.match || {};
        let score = 0;
        Object.values(m).forEach((v) => {
          const n = normalizeMatchValue(v);
          if (n.any) score += 0;
          else if (n.list) score += 1;
          else score += 2;
        });
        return score;
      }

      function matchRecommendation() {
        const branchKey = state.branch;
        const b = PRODUCTS[branchKey];
        const q2 = state.answers.q2;
        const q3 = state.answers.q3;

        const ctx = {
          branch: branchKey,
          q2,
          q3,
        };

        const rules = b.rules.slice();
        const candidates = [];

        for (const r of rules) {
          const m = r.match || {};
          let ok = true;

          if (branchKey === "iphone") {
            const budget = m.budget;
            const care = m.care;
            const nb = normalizeMatchValue(budget ?? "*");
            const nc = normalizeMatchValue(care ?? "*");
            if (!nb.any && nb.value && nb.value !== q2) ok = false;
            if (!nb.any && nb.list && !nb.list.includes(q2)) ok = false;
            if (!nc.any && nc.value && nc.value !== q3) ok = false;
            if (!nc.any && nc.list && !nc.list.includes(q3)) ok = false;
          } else if (branchKey === "macbook") {
            const usage = m.usage;
            const tilt = m.tilt;
            const nu = normalizeMatchValue(usage ?? "*");
            const nt = normalizeMatchValue(tilt ?? "*");
            if (!nu.any && nu.value && nu.value !== q2) ok = false;
            if (!nu.any && nu.list && !nu.list.includes(q2)) ok = false;
            if (!nt.any && nt.value && nt.value !== q3) ok = false;
            if (!nt.any && nt.list && !nt.list.includes(q3)) ok = false;
          } else {
            const device = m.device;
            const care = m.care;
            const nd = normalizeMatchValue(device ?? "*");
            const nc = normalizeMatchValue(care ?? "*");
            if (!nd.any && nd.value && nd.value !== q2) ok = false;
            if (!nd.any && nd.list && !nd.list.includes(q2)) ok = false;
            if (!nc.any && nc.value && nc.value !== q3) ok = false;
            if (!nc.any && nc.list && !nc.list.includes(q3)) ok = false;
          }

          if (ok) candidates.push(r);
        }

        candidates.sort((a, b2) => ruleScore(b2) - ruleScore(a));
        const picked = candidates[0] || b.rules[0];

        const why = buildWhy(ctx, picked);

        return {
          branch: branchKey,
          q2,
          q3,
          primary: picked.primary,
          alt: picked.alt,
          tag: picked.tag,
          accessories: picked.accessories || [],
          compareFields: b.compareFields,
          compare: picked.compare || {},
          why,
        };
      }

      function buildWhy(ctx, pickedRule) {
        for (const t of COPY.whyTemplates) {
          if (t.when(ctx)) return t.text;
        }
        const a = ctx.q2;
        const c = ctx.q3;
        if (ctx.branch === "iphone") {
          return `你选择了 ${a} 的预算，并更在意「${c}」。${pickedRule.primary.name} 在这个组合里更均衡：既能覆盖核心体验，也更适合长期使用。`;
        }
        if (ctx.branch === "macbook") {
          return `你的主要用途是「${a}」，取向是「${c}」。这意味着你更需要在尺寸与性能之间找到匹配的平衡，${pickedRule.primary.name} 更贴合这个优先级。`;
        }
        return `你更在意「${c}」，设备侧重「${a}」。${pickedRule.primary.name} 在连接与体验上更贴合你的高频场景，用起来更省心。`;
      }
