<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Me Choose</title>
  <style>
    :root{
      --bg:#FFFFFF; --text:#1D1D1F; --muted:#6E6E73; --gray:#F5F5F7;
      --blue:#0071E3; --border:rgba(0,0,0,.08);
      --shadow:0 10px 30px rgba(0,0,0,.08); --shadow-soft:0 6px 18px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;}
    a{color:inherit}
    .app{min-height:100%;display:flex;justify-content:center;padding:20px 14px 40px;}
    .shell{width:100%;max-width:560px;margin:0 auto;}
    .top{position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:12px 0 10px;z-index:10;}
    .brand{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 6px 10px;}
    .brand .name{font-weight:600;letter-spacing:.2px;font-size:14px;color:rgba(29,29,31,.9);}
    .brand .chip{font-size:12px;color:var(--muted);background:var(--gray);border:1px solid var(--border);padding:6px 10px;border-radius:999px;white-space:nowrap;}
    .progress{height:6px;background:rgba(0,0,0,.06);border-radius:999px;overflow:hidden;margin:0 6px;}
    .progress>div{height:100%;width:0%;background:var(--blue);border-radius:999px;transition:width .35s ease;}
    .stage{position:relative;padding-top:10px;}
    .screen{display:none;opacity:0;transform:translateY(6px);transition:opacity .3s ease,transform .3s ease;padding:12px 6px 0;}
    .screen.active{display:block;} .screen.visible{opacity:1;transform:translateY(0);}
    .screen.result-animate{transform:translateY(18px);transition:opacity .3s ease,transform .4s ease;}
    h1{margin:8px 0 10px;font-size:34px;line-height:1.12;letter-spacing:-0.02em;}
    h2{margin:6px 0 10px;font-size:22px;letter-spacing:-0.01em;}
    p{margin:0 0 18px;color:var(--muted);line-height:1.55;}
    .cardGrid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:10px;}
    .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 16px;box-shadow:var(--shadow-soft);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;user-select:none;-webkit-tap-highlight-color:transparent;}
    .card:hover{transform:translateY(-1px);box-shadow:var(--shadow);border-color:rgba(0,0,0,.12);}
    .card:active{transform:translateY(0);box-shadow:var(--shadow-soft);}
    .cardTitle{font-weight:700;font-size:18px;letter-spacing:-0.01em;margin:0 0 6px;}
    .cardDesc{margin:0;color:var(--muted);font-size:14px;line-height:1.5;}
    .cardMeta{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;font-size:12px;color:rgba(29,29,31,.85);background:var(--gray);border:1px solid var(--border);white-space:nowrap;}
    .arrow{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(0,113,227,.10);color:var(--blue);border:1px solid rgba(0,113,227,.18);flex:0 0 auto;}
    .hero{background:linear-gradient(180deg,rgba(245,245,247,.9),rgba(255,255,255,1));border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);padding:20px 16px;box-shadow:var(--shadow-soft);}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
    .btn{height:48px;padding:0 16px;border-radius:999px;border:1px solid transparent;font-weight:600;font-size:14px;letter-spacing:.2px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s ease,box-shadow .12s ease,background .12s ease,border-color .12s ease;}
    .btn:active{transform:translateY(1px);}
    .btnPrimary{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(0,113,227,.18);}
    .btnPrimary:hover{box-shadow:0 12px 28px rgba(0,113,227,.22);}
    .btnSecondary{background:#fff;color:var(--text);border-color:rgba(0,0,0,.14);box-shadow:var(--shadow-soft);}
    .btnSecondary:hover{border-color:rgba(0,0,0,.18);box-shadow:var(--shadow);}
    .btnGhost{background:transparent;color:var(--text);border-color:rgba(0,0,0,.10);}
    .btnGhost:hover{border-color:rgba(0,0,0,.16);background:rgba(0,0,0,.02);}
    .btnFull{flex:1 1 180px;}
    .resultHeader{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
    .resultStack{display:grid;gap:12px;}
    .bigCard{padding:18px 16px;}
    .bigTitle{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;}
    .productName{font-size:18px;font-weight:800;letter-spacing:-0.01em;margin:0;}
    .price{font-size:14px;font-weight:700;color:rgba(29,29,31,.86);background:var(--gray);border:1px solid var(--border);padding:8px 10px;border-radius:999px;white-space:nowrap;}
    .bullets{margin:10px 0 0;padding-left:18px;color:rgba(29,29,31,.88);line-height:1.6;font-size:14px;}
    .why{margin-top:12px;padding:12px 12px;background:rgba(0,113,227,.06);border:1px solid rgba(0,113,227,.14);border-radius:14px;color:rgba(29,29,31,.9);line-height:1.55;font-size:14px;}
    /* 升级洞察卡片 */
    .insightCard{margin-top:10px;padding:13px 14px;background:rgba(255,159,67,.07);border:1px solid rgba(255,159,67,.28);border-radius:14px;}
    .insightLabel{font-size:11px;font-weight:700;letter-spacing:.6px;color:rgba(185,100,20,.8);text-transform:uppercase;margin-bottom:6px;}
    .insightBody{font-size:14px;line-height:1.55;color:rgba(29,29,31,.88);}
    /* 注意事项卡片（Air eSIM 警告等） */
    .noteCard{margin-top:10px;padding:10px 14px;background:rgba(255,59,48,.05);border:1px solid rgba(255,59,48,.18);border-radius:12px;font-size:13px;line-height:1.5;color:rgba(175,40,30,.85);}
    .subCards{display:grid;grid-template-columns:1fr;gap:10px;}
    .mini{padding:14px 14px;box-shadow:none;cursor:default;}
    .mini:hover{transform:none;box-shadow:none;}
    .miniTitle{margin:0;font-weight:800;letter-spacing:-0.01em;font-size:15px;}
    .miniDesc{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.5;}
    .miniFooter{margin-top:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
    .sectionTitle{margin:18px 0 10px;font-size:15px;font-weight:800;letter-spacing:-0.01em;color:rgba(29,29,31,.92);}
    .compareWrap{overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .35s ease,opacity .25s ease,transform .25s ease;}
    .compareWrap.open{opacity:1;transform:translateY(0);max-height:1000px;}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:var(--radius);border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft);}
    th,td{text-align:left;padding:12px 12px;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:top;font-size:13px;line-height:1.45;}
    th{background:var(--gray);font-weight:800;letter-spacing:-0.01em;color:rgba(29,29,31,.9);}
    tr:last-child td{border-bottom:none;}
    .footerLink{margin-top:18px;display:inline-block;color:rgba(0,113,227,.95);text-decoration:none;font-weight:600;padding:8px 4px;}
    .footerLink:hover{text-decoration:underline;}
    .modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:16px;z-index:100;}
    .modalOverlay.show{display:flex;}
    .modal{width:100%;max-width:520px;background:#fff;border-radius:22px;border:1px solid rgba(255,255,255,.6);box-shadow:0 24px 70px rgba(0,0,0,.25);overflow:hidden;transform:translateY(10px);opacity:0;transition:transform .22s ease,opacity .22s ease;}
    .modalOverlay.show .modal{transform:translateY(0);opacity:1;}
    .modalHead{padding:14px 16px;background:rgba(245,245,247,.92);border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .modalTitle{font-weight:800;letter-spacing:-0.01em;font-size:14px;margin:0;}
    .iconBtn{width:36px;height:36px;border-radius:999px;border:1px solid rgba(0,0,0,.10);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s ease,border-color .12s ease;}
    .iconBtn:hover{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.14);}
    .modalBody{padding:14px 16px 16px;}
    .textarea{width:100%;min-height:120px;padding:12px 12px;border-radius:16px;border:1px solid rgba(0,0,0,.12);background:#fff;font-size:13px;line-height:1.55;color:rgba(29,29,31,.92);resize:vertical;outline:none;}
    .hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.45;}
    @media(min-width:740px){
      .app{padding:28px 18px 60px;}
      .cardGrid{grid-template-columns:1fr 1fr 1fr;}
      .subCards{grid-template-columns:1fr 1fr;}
      h1{font-size:40px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="shell" role="application" aria-label="Help Me Choose">
    <div class="top">
      <div class="brand">
        <div class="name">Help Me Choose</div>
        <div class="chip" id="chipStatus">准备开始</div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
    <main class="stage">

      <section class="screen" id="screen-welcome">
        <div class="hero">
          <h1>Help Me Choose</h1>
          <p>告诉我你现在的情况，我来帮你选最适合的那款</p>
          <div class="btnRow"><button class="btn btnPrimary btnFull" id="btnStart">开始选购</button></div>
        </div>
      </section>

      <section class="screen" id="screen-q1">
        <h2>你现在更想买哪类产品？</h2>
        <p>选一个方向，我们根据你的实际情况做精准推荐。</p>
        <div class="cardGrid" id="q1Grid"></div>
      </section>

      <section class="screen" id="screen-q2">
        <h2 id="q2Title"></h2><p id="q2Hint"></p>
        <div class="cardGrid" id="q2Grid"></div>
      </section>

      <section class="screen" id="screen-q3">
        <h2 id="q3Title"></h2><p id="q3Hint"></p>
        <div class="cardGrid" id="q3Grid"></div>
      </section>

      <section class="screen" id="screen-q4">
        <h2 id="q4Title"></h2><p id="q4Hint"></p>
        <div class="cardGrid" id="q4Grid"></div>
      </section>

      <section class="screen result-animate" id="screen-result">
        <div class="resultHeader">
          <h2 style="margin:0">这是为你挑选的推荐</h2>
          <p id="resultSub" style="margin:0"></p>
        </div>
        <div class="resultStack">

          <div class="card bigCard" id="primaryCard" style="cursor:default">
            <div class="bigTitle">
              <div>
                <p class="pill" id="reasonTag" style="margin:0 0 10px;display:inline-flex"></p>
                <p class="productName" id="primaryName"></p>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;">
                <span id="primaryOldLabel" style="font-size:11px;color:var(--muted);margin-bottom:4px;display:none;font-weight:600;">历史官方参考价</span>
                <div class="price" id="primaryPrice"></div>
              </div>
            </div>
            <ul class="bullets" id="primaryBullets"></ul>
            <div class="why" id="primaryWhy"></div>
            <div class="noteCard" id="productNote" style="display:none" aria-label="注意事项">
              <span id="productNoteText"></span>
            </div>
          </div>

          <div id="insightWrap" style="display:none">
            <div class="insightCard">
              <div class="insightLabel">升级洞察 · 这次换值不值？</div>
              <div class="insightBody" id="insightText"></div>
            </div>
          </div>

          <div>
            <div class="sectionTitle">备选款</div>
            <div class="subCards">
              <div class="card mini" id="altCard">
                <p class="miniTitle" id="altName"></p>
                <p class="miniDesc" id="altDiff"></p>
                <div class="miniFooter">
                  <span class="pill">备选价格</span>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;">
                    <span id="altOldLabel" style="font-size:11px;color:var(--muted);margin-bottom:4px;display:none;font-weight:600;">历史官方参考价</span>
                    <span class="price" id="altPrice"></span>
                    <span id="altOldBadge" style="font-size:11px;color:rgba(175,40,30,.85);margin-top:6px;display:none;font-weight:600;letter-spacing:-0.01em;">当前 Apple Store 已下架</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="sectionTitle">搭配推荐</div>
            <div class="subCards" id="accessoryGrid"></div>
          </div>

          <div>
            <div class="sectionTitle">下一步</div>
            <div class="btnRow">
              <button class="btn btnPrimary btnFull" id="btnStore">在 Apple Store 查看</button>
              <button class="btn btnSecondary btnFull" id="btnCompare">对比主推 vs 备选</button>
              <button class="btn btnGhost btnFull" id="btnSave">保存这套推荐</button>
            </div>
          </div>

          <div class="compareWrap" id="compareWrap">
            <div style="height:10px"></div>
            <table>
              <thead><tr>
                <th style="width:26%">项目</th>
                <th id="thPrimary" style="width:37%">主推</th>
                <th id="thAlt" style="width:37%">备选</th>
              </tr></thead>
              <tbody id="compareBody"></tbody>
            </table>
          </div>

          <a class="footerLink" href="#" id="linkRestart">重新来过</a>
        </div>
      </section>

    </main>
  </div>
</div>

<div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="保存推荐摘要">
  <div class="modal">
    <div class="modalHead">
      <p class="modalTitle">可复制的推荐摘要</p>
      <button class="iconBtn" id="btnCloseModal" aria-label="关闭">×</button>
    </div>
    <div class="modalBody">
      <textarea class="textarea" id="saveText" readonly></textarea>
      <div class="btnRow" style="margin-top:12px">
        <button class="btn btnPrimary btnFull" id="btnCopy">复制摘要</button>
        <button class="btn btnSecondary btnFull" id="btnSelectAll">全选</button>
      </div>
      <p class="hint">提示：你也可以直接长按文本进行复制。</p>
    </div>
  </div>
</div>

<script>
(() => {
'use strict';
const $ = s => document.querySelector(s);
function esc(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

// ══ State ═══════════════════════════════════════════════════
const state = { branch:null, answers:{q1:null,q2:null,q3:null,q4:null}, matched:null, compareOpen:false };

// ══ Q1 ══════════════════════════════════════════════════════
const Q1 = [
  { key:'iphone',  label:'iPhone',  desc:'想换一台更适合你的手机' },
  { key:'macbook', label:'MacBook', desc:'找一台适合你工作与生活的笔记本' },
  { key:'airpods', label:'AirPods', desc:'挑一副更适合你使用场景的耳机' },
];

// ══ Branch Questions ═════════════════════════════════════════
const QS = {
  iphone:{
    q2:{ title:'你现在在用什么手机？', hint:'告诉我你的起点，我才能判断这次升级对你来说值不值、该怎么选。',
      opts:[
        {l:'Android / 第一次用 iPhone', d:'全新进入苹果生态，没有历史包袱。'},
        {l:'iPhone 13 及更早',           d:'已经用了 3 年以上，升级空间很大。'},
        {l:'iPhone 14–15 标准版',        d:'用了 1–2 年，看看有没有值得换的理由。'},
        {l:'iPhone 14–15 Pro / Pro Max', d:'已在 Pro 系列，升级需要更强理由。'},
      ]},
    q3:{ title:'这次换手机最主要因为什么？', hint:'换机动机直接决定哪款真正值得推荐给你。',
      opts:[
        {l:'续航不行了',          d:'每天要充好几次，续航是最大痛点。'},
        {l:'存储不够',            d:'手机经常提示空间不足，存照片视频很烦。'},
        {l:'想要更好的拍照 / 视频', d:'对摄影摄像有更高追求。'},
        {l:'想要更轻更小的手感',  d:'现在的手机握着不舒服，想轻巧一点。'},
        {l:'想一步到位，用很多年', d:'不想频繁换机，选一次选到位。'},
      ]},
    q4:{ title:'这次怎么买更像你？', hint:'最后一步，在合适机型中找到更符合你风格的选择。',
      opts:[
        {l:'控制预算',    d:'够用就好，不为用不到的功能多花钱。'},
        {l:'新款优先',    d:'想要最新一代的体验和系统支持。'},
        {l:'大容量优先',  d:'存储容量是我最在意的，宁愿容量大一点。'},
        {l:'旗舰完整体验', d:'想要最完整的旗舰功能，预算不是主要顾虑。'},
      ]},
  },
  macbook:{
    q2:{ title:'你主要拿它做什么？', hint:'使用场景是最重要的推荐依据，选你最常发生的那个。',
      opts:[
        {l:'文档办公 / 上课', d:'Word、PPT、网课、邮件是主力。'},
        {l:'写代码 / 开发',   d:'IDE、终端、本地服务是常驻场景。'},
        {l:'视频剪辑 / 设计', d:'Final Cut、PR、Figma 等高性能需求。'},
        {l:'日常全能',        d:'什么都做，没有特别重的单一需求。'},
      ]},
    q3:{ title:'你更像哪种使用形态？', hint:'这会影响我们在尺寸和性能之间的取舍方向。',
      opts:[
        {l:'经常带着走',        d:'上课/通勤/咖啡馆，便携是第一位。'},
        {l:'主要在宿舍 / 工位用', d:'主要在固定场所，不太经常移动。'},
        {l:'经常接显示器 / 外设', d:'有外接屏幕和多个外设的桌面习惯。'},
        {l:'想一台机器用很多年', d:'希望性能抗住未来几年的需求。'},
      ]},
    q4:{ title:'你这次怎么买更像你？', hint:'最后一步，确认你的整体购买取向。',
      opts:[
        {l:'预算友好',   d:'在满足需求的前提下，尽量省钱。'},
        {l:'均衡稳妥',   d:'体验与价格之间找到踏实的平衡。'},
        {l:'性能抗未来', d:'不想被性能拖慢，选就选有余量的。'},
        {l:'大屏优先',   d:'更大的屏幕让工作和娱乐体验更好。'},
      ]},
  },
  airpods:{
    q2:{ title:'你主要和什么设备搭配？', hint:'设备生态影响自动切换体验和音频延迟优化。',
      opts:[
        {l:'主要用 iPhone',      d:'手机场景为主，偶尔接 Mac。'},
        {l:'主要用 Mac',         d:'桌面/笔记本场景为主。'},
        {l:'iPhone + Mac 都用',  d:'两个设备经常切换，多设备体验很重要。'},
      ]},
    q3:{ title:'你最常在哪种场景用？', hint:'场景决定我们更优先考虑降噪、形态还是运动稳固。',
      opts:[
        {l:'通勤 / 降噪',       d:'地铁、公交、嘈杂环境，需要隔绝噪音。'},
        {l:'日常轻便佩戴',       d:'随时戴上随时摘，不想有异物感。'},
        {l:'办公 / 多设备切换', d:'手机和电脑经常换着用，切换要顺滑。'},
        {l:'运动使用',           d:'跑步、健身时佩戴，需要稳固不掉落。'},
      ]},
    q4:{ title:'你这次更希望耳机优先满足什么？', hint:'帮我们在同场景里找到最适合你的那一副。',
      opts:[
        {l:'价格更友好',   d:'功能够用，花最少的钱。'},
        {l:'有降噪更安心', d:'降噪是我最在意的功能，不能没有。'},
        {l:'音质更好',     d:'听感细腻，声场丰富更重要。'},
        {l:'佩戴更轻松',   d:'长时间戴着不难受，轻便舒适最重要。'},
      ]},
  },
};

// ══ iPhone First-timer Questions (separate path) ════════════
const QS_IP_FIRST = {
  q3:{ title:'你第一次用 iPhone，最希望马上感受到什么？', hint:'告诉我你最在意的体验方向，帮你找到最合适的入门款。',
    opts:[

function scoreIP(s, q2, q3, q4){
  let sc = 0;

  if(q3==='存储不够' && q4==='大容量优先' && s.gb<256) return -999;
  if(q3==='想一步到位，用很多年' && s.gb<256) return -999;
  if(q3==='续航不行了' && q4==='控制预算' && s.size==='max') return -999;

  if(q2==='Android / 第一次用 iPhone'){
    if(s.gen===17&&s.tier==='std') sc+=30; else if(s.gen===17&&s.tier==='pro'&&s.size!=='max') sc+=18;
    else if(s.gen===17&&s.size==='max') sc+=10; else if(s.gen===16) sc+=14;
  } else if(q2==='iPhone 13 及更早'){
    if(s.gen===17) sc+=30; else sc+=16;
  } else if(q2==='iPhone 14–15 标准版'){
    if(s.gen===17&&s.tier==='pro') sc+=30; else if(s.gen===17&&s.tier==='std') sc+=20;
    else if(s.gen===16) sc+=10;
  } else { 
    if(s.gen===17&&s.tier==='pro') sc+=30; else if(s.gen===17&&s.tier==='std') sc+=12; else sc+=4;
  }

  if(q3==='续航不行了'){
    if(s.size==='max') sc+=20; else if(s.size==='plus') sc+=24; else if(s.size==='air') sc+=8; else if(s.gen===17) sc+=22; else sc+=14;
  } else if(q3==='存储不够'){
    if(s.gb>=512) sc+=30; else if(s.gb>=256) sc+=22; else sc+=6;
  } else if(q3==='想要更好的拍照 / 视频'){
    if(s.tier==='pro') sc+=30; else if(s.gen===17) sc+=12; else sc+=5;
  } else if(q3==='想要更轻更小的手感'){
    if(s.size==='reg') sc+=30; else if(s.size==='air') sc+=18;
  } else { 
    if(s.tier==='pro'&&s.gb>=256) sc+=30; else if(s.gb>=256) sc+=20; else sc+=10;
  }

  if(q4==='控制预算'){
    if(s.n<=4999) sc+=20; else if(s.n<=5499) sc+=18; else if(s.n<=5999) sc+=14;
    else if(s.n<=6499) sc+=10; else sc+=Math.max(0,8-Math.floor((s.n-6500)/1500));
  } else if(q4==='新款优先'){
    if(s.gen===17) sc+=20; else sc+=6;
  } else if(q4==='大容量优先'){
    if(s.gb>=512) sc+=20; else if(s.gb>=256) sc+=14; else sc+=3;
  } else { 
    if(s.size==='max') sc+=20; else if(s.tier==='pro') sc+=16; else sc+=4;
  }

  if(q3==='续航不行了'&&q4!=='控制预算'&&s.size==='max') sc+=20;
  if(q3==='续航不行了'&&q4==='控制预算'&&s.size==='plus') sc+=20;
  if(q3==='续航不行了'&&q4!=='控制预算'&&s.size==='plus') sc+=15;
  if(q3==='存储不够'&&q4==='大容量优先'&&s.gb>=512) sc+=20;
  else if(q3==='存储不够'&&q4==='大容量优先'&&s.gb>=256) sc+=10;

  return sc;
}

function matchIP(q2,q3,q4){
  const primary = IP.reduce((best,s)=>{ const sc=scoreIP(s,q2,q3,q4); return sc>best.sc?{s,sc}:best; },{s:IP[4],sc:-Infinity}).s;
  const altPool = IP.filter(s=>s.id!==primary.id);
  const altScore = s=>{
    let sc=0;
    if(s.gen===17) sc+=20; else sc+=8;
    if(s.tier==='pro') sc+=15;
    if(s.gb>=256) sc+=10;
    if(q4==='控制预算'&&s.n<primary.n) sc+=15;
    if(q4==='新款优先'&&s.gen>primary.gen) sc+=12;
    if(q4==='大容量优先'&&s.gb>primary.gb) sc+=15;
    if(q4==='旗舰完整体验'&&s.tier==='pro'&&primary.tier!=='pro') sc+=18;
    if(q3==='续航不行了'&&s.size==='plus') sc+=18;
    return sc;
  };
  const alt = altPool.reduce((best,s)=>{ const sc=altScore(s); return sc>best.sc?{s,sc}:best; },{s:altPool[0],sc:-Infinity}).s;
  return {primary,alt};
}

function ipAltDiff(primary,alt){
  const costLess = alt.isOld ? `历史参考价便宜 RMB ${primary.n-alt.n} 元` : `便宜 RMB ${primary.n-alt.n} 元`;
  const costMore = alt.isOld ? `历史参考价为 RMB ${alt.n}（高于主推现价）` : `多花 RMB ${alt.n-primary.n} 元`;
  const priceDiffStr = alt.n < primary.n ? costLess : (alt.n > primary.n ? costMore : '价格相同');

  if(alt.gb>primary.gb) return `如果你更在意大容量（${alt.gb}GB），${alt.name} ${alt.n>primary.n ? costMore : costLess}`;
  if(alt.gb<primary.gb) return `如果你更在意控制预算，${alt.name} ${costLess}，存储更克制（${alt.gb}GB）`;
  if(alt.tier==='pro'&&primary.tier!=='pro') return `如果你更在意 Pro 级影像（5× 长焦），${alt.name} 是更完整的旗舰选择`;
  if(alt.size==='max') return `如果你更在意大屏和最强续航，${alt.name} 屏幕更大，续航更强`;
  if(alt.size==='plus') return `如果你更在意大屏和极佳续航体验，${alt.name} 是标准版里的长续航优选，${priceDiffStr}`;
  if(alt.n<primary.n) return `如果你更在意节省预算，${alt.name} ${costLess}`;
  if(alt.n>primary.n) return `如果你更在意更完整体验，${alt.name} ${costMore}`;
  return `${alt.name} 是另一个值得考虑的方向`;
}

}

function apWhy(q2,q3,q4,p,a){
  const sc={'通勤 / 降噪':'通勤降噪是你的核心场景，','日常轻便佩戴':'你追求日常轻便自然的佩戴感，','办公 / 多设备切换':'你经常在多设备间切换，','运动使用':'运动场景对稳固性要求高，'}[q3]||'';
  const pf={'价格更友好':'同时希望价格更友好，','有降噪更安心':'降噪是你不妥协的功能，','音质更好':'你对音质有更高要求，','佩戴更轻松':'佩戴舒适是你最在意的，'}[q4]||'';
  return `${sc}${pf}因此 ${p.name} 是最适合你的选择。`;
}

function apAltDiff(p,a){
  if(a.id==='appro2'&&p.id!=='appro2') return `如果你更在意更完整的降噪体验，AirPods Pro 2 的入耳式降噪更彻底，多花 RMB ${a.n-p.n} 元`;
  if(a.id==='ap4anc'&&p.n>a.n) return `如果你更在意轻便 + 节省预算，AirPods 4 主动降噪版也有降噪，便宜 RMB ${p.n-a.n} 元`;
  if(a.id==='ap4std') return `如果你对降噪没有需求且更在意价格，AirPods 4 标准版便宜 RMB ${p.n-a.n} 元，日常够用`;
  if(a.id==='apmax') return `如果你更在意头戴式沉浸音质且主要在固定场景使用，AirPods Max 是更极致的选择`;
  if(a.id==='beats') return `如果你有运动需求，Beats Fit Pro 的翼形耳钩更稳固，专为运动设计`;
  return a.n>p.n?`如果你更在意更完整体验，${a.name} 多花 RMB ${a.n-p.n} 元`:`如果你更在意控制预算，${a.name} 便宜 RMB ${p.n-a.n} 元`;
}

function apTag(q3,q4){
  if(q3==='通勤 / 降噪') return '通勤降噪推荐';
  if(q3==='日常轻便佩戴') return '轻便日常推荐';
  if(q3==='办公 / 多设备切换') return '多设备办公推荐';
  return '运动专属推荐';
}

// ══ Match Entry ══════════════════════════════════════════════
function match(){
  const {branch,answers:{q2,q3,q4}}=state;
  let primary,alt,tag,why,altDiff,insight=null,cmpFields,pCmp,aCmp,storeUrl;

  if(branch==='iphone'){
    const isFirstTimer = q2 === 'Android / 第一次用 iPhone';
    if(isFirstTimer){
      const r=matchIPFirstTimer(q3,q4);
      primary=r.primary; alt=r.alt;
      tag=ipTagFirstTimer(q3,q4,primary);
      why=ipWhyFirstTimer(q3,q4,primary,alt);
      altDiff=ipAltDiffFirstTimer(q3,q4,primary,alt);
      insight=null;
    } else {
      const r=matchIP(q2,q3,q4);
      primary=r.primary; alt=r.alt;
      tag=ipTag(q2,q3,q4,primary);
      why=ipWhy(q2,q3,q4,primary,alt);
      altDiff=ipAltDiff(primary,alt);
      insight=ipInsight(q2,q3,q4,primary);
    }
    cmpFields=IP_CMP_FIELDS; 
    pCmp={...primary.cmp}; 
    aCmp={...alt.cmp};

    const formatCmpPriceStr = (sku) => sku.isOld ? `历史官方参考价<br><strong>RMB ${sku.n} 起</strong><br><span style="color:rgba(175,40,30,.85);font-size:11px;display:inline-block;margin-top:4px;font-weight:600;">当前 Apple Store 已下架</span>` : `<strong>RMB ${sku.n} 起</strong>`;

    pCmp['价格'] = formatCmpPriceStr(primary);
    aCmp['价格'] = formatCmpPriceStr(alt);

    primary = {
      name: primary.name, price: `RMB ${primary.n} 起`, isOld: primary.isOld,
      bullets: primary.b, accessories: primary.acc, note: primary.note||null
    };
    alt = {
      name: alt.name, price: `RMB ${alt.n} 起`, diff: altDiff, isOld: alt.isOld
    };
    storeUrl='https://www.apple.com.cn/shop/buy-iphone';

  } else if(branch==='macbook'){
    const r=matchMB(q2,q3,q4);
    primary=r.primary; alt=r.alt;
    tag=primary.tag;
    why=mbWhy(q2,q3,q4,primary,alt);
    altDiff=mbAltDiff(primary,alt);
    cmpFields=MB_CMP_FIELDS; pCmp={...primary.cmp}; aCmp={...alt.cmp};
    pCmp['价格'] = `<strong>${primary.price}</strong>`;
    aCmp['价格'] = `<strong>${alt.price}</strong>`;
    storeUrl='https://www.apple.com.cn/shop/buy-mac';
  } else {
    const r=matchAP(q2,q3,q4);
    primary=r.primary; alt=r.alt;
    tag=apTag(q3,q4);
    why=apWhy(q2,q3,q4,primary,alt);
    altDiff=apAltDiff(primary,alt);
    cmpFields=AP_CMP_FIELDS; pCmp={...primary.cmp}; aCmp={...alt.cmp};
    pCmp['价格'] = `<strong>${primary.price}</strong>`;
    aCmp['价格'] = `<strong>${alt.price}</strong>`;
    storeUrl='https://www.apple.com.cn/shop/buy-airpods';
  }

  const compare={};
  cmpFields.forEach(f=>{ compare[f]=[pCmp[f]||'—',aCmp[f]||'—']; });

  return {
    branch,q2,q3,q4,tag,why,insight,storeUrl,
    primary, alt,
    accessories:primary.accessories||primary.acc||[],
    compareFields:cmpFields,
    compare,
  };
}

// ══ UI ═══════════════════════════════════════════════════════
const el={
  chipStatus:$('#chipStatus'), progressBar:$('#progressBar'),
  screens:{welcome:$('#screen-welcome'),q1:$('#screen-q1'),q2:$('#screen-q2'),q3:$('#screen-q3'),q4:$('#screen-q4'),result:$('#screen-result')},
  btnStart:$('#btnStart'),
  q1Grid:$('#q1Grid'),
  q2Title:$('#q2Title'),q2Hint:$('#q2Hint'),q2Grid:$('#q2Grid'),
  q3Title:$('#q3Title'),q3Hint:$('#q3Hint'),q3Grid:$('#q3Grid'),
  q4Title:$('#q4Title'),q4Hint:$('#q4Hint'),q4Grid:$('#q4Grid'),
  resultSub:$('#resultSub'),reasonTag:$('#reasonTag'),
  primaryName:$('#primaryName'),primaryPrice:$('#primaryPrice'),primaryOldLabel:$('#primaryOldLabel'),primaryBullets:$('#primaryBullets'),primaryWhy:$('#primaryWhy'),
  productNote:$('#productNote'),productNoteText:$('#productNoteText'),
  insightWrap:$('#insightWrap'),insightText:$('#insightText'),
  altName:$('#altName'),altDiff:$('#altDiff'),altPrice:$('#altPrice'),altOldLabel:$('#altOldLabel'),altOldBadge:$('#altOldBadge'),
  accessoryGrid:$('#accessoryGrid'),
  btnStore:$('#btnStore'),btnCompare:$('#btnCompare'),
  compareWrap:$('#compareWrap'),compareBody:$('#compareBody'),
  thPrimary:$('#thPrimary'),thAlt:$('#thAlt'),
  btnSave:$('#btnSave'),linkRestart:$('#linkRestart'),
  modalOverlay:$('#modalOverlay'),btnCloseModal:$('#btnCloseModal'),
  saveText:$('#saveText'),btnCopy:$('#btnCopy'),btnSelectAll:$('#btnSelectAll'),
};
const STEPS={
  welcome:{p:0,c:'准备开始'},q1:{p:20,c:'第 1/4 步'},q2:{p:45,c:'第 2/4 步'},
  q3:{p:70,c:'第 3/4 步'},q4:{p:90,c:'第 4/4 步'},result:{p:100,c:'推荐已生成'},
};

function showScreen(key,isResult=false){
  const s=STEPS[key]||STEPS.welcome;
  el.progressBar.style.width=s.p+'%'; el.chipStatus.textContent=s.c;
  Object.entries(el.screens).forEach(([k,node])=>{
    if(!node)return;
    if(k===key) node.classList.add('active');
    else node.classList.remove('visible','active');
  });
  const node=el.screens[key]; if(!node)return;
  if(isResult) node.classList.add('result-animate');
  requestAnimationFrame(()=>{
    node.classList.add('visible');
    if(isResult) requestAnimationFrame(()=>node.classList.remove('result-animate'));
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

function cardHTML(label,desc,meta='单选'){
  return `<div class="card" role="button" tabindex="0" aria-label="${esc(label)}">
    <div class="cardTitle">${esc(label)}</div>
    <p class="cardDesc">${esc(desc)}</p>
    <div class="cardMeta"><span class="pill">${esc(meta)}</span><span class="arrow" aria-hidden="true">→</span></div>
  </div>`;
}

function bindCards(container,cb){
  container.onclick=e=>{
    const c=e.target.closest('.card'); if(!c||!container.contains(c))return;
    cb([...container.querySelectorAll('.card')].indexOf(c));
  };
  container.onkeydown=e=>{
    if(e.key!=='Enter'&&e.key!==' ')return;
    const c=e.target.closest('.card'); if(!c||!container.contains(c))return;
    e.preventDefault(); cb([...container.querySelectorAll('.card')].indexOf(c));
  };
}

function renderQ1(){
  el.q1Grid.innerHTML=Q1.map(o=>cardHTML(o.label,o.desc,'选择品类')).join('');
  bindCards(el.q1Grid,idx=>{
    state.branch=Q1[idx].key;
    state.answers={q1:Q1[idx].label,q2:null,q3:null,q4:null};
    state.compareOpen=false; el.compareWrap.classList.remove('open');
    renderQ2(); showScreen('q2');
  });
}

function renderQ2(){
  const q=QS[state.branch].q2;
  el.q2Title.textContent=q.title; el.q2Hint.textContent=q.hint;
  el.q2Grid.innerHTML=q.opts.map(o=>cardHTML(o.l,o.d)).join('');
  bindCards(el.q2Grid,idx=>{ state.answers.q2=q.opts[idx].l; renderQ3(); showScreen('q3'); });
}

function renderQ3(){
  const isFirstTimer = state.branch==='iphone' && state.answers.q2==='Android / 第一次用 iPhone';
  const q = isFirstTimer ? QS_IP_FIRST.q3 : QS[state.branch].q3;
  el.q3Title.textContent=q.title; el.q3Hint.textContent=q.hint;
  el.q3Grid.innerHTML=q.opts.map(o=>cardHTML(o.l,o.d)).join('');
  bindCards(el.q3Grid,idx=>{ state.answers.q3=q.opts[idx].l; renderQ4(); showScreen('q4'); });
}

function renderQ4(){
  const isFirstTimer = state.branch==='iphone' && state.answers.q2==='Android / 第一次用 iPhone';
  const q = isFirstTimer ? QS_IP_FIRST.q4 : QS[state.branch].q4;
  el.q4Title.textContent=q.title; el.q4Hint.textContent=q.hint;
  el.q4Grid.innerHTML=q.opts.map(o=>cardHTML(o.l,o.d)).join('');
  bindCards(el.q4Grid,idx=>{
    state.answers.q4=q.opts[idx].l;
    state.matched=match();
    renderResult(state.matched);
    showScreen('result',true);
  });
}

function renderResult(m){
  el.resultSub.textContent='基于你的回答，我们为你整理了最适合的主推、备选与搭配建议。';
  el.reasonTag.textContent=m.tag?'推荐理由：'+m.tag:'推荐理由';
  el.primaryName.textContent=m.primary.name;
  el.primaryPrice.textContent=m.primary.price;
  el.primaryBullets.innerHTML=(m.primary.bullets||[]).map(x=>`<li>${esc(x)}</li>`).join('');
  el.primaryWhy.textContent=m.why;

  if (m.primary.isOld) {
    el.primaryOldLabel.style.display = 'block';
    el.productNote.style.display = '';
    el.productNoteText.innerHTML = '<strong>当前 Apple Store 已下架</strong>' + (m.primary.note ? '<br>' + esc(m.primary.note) : '');
  } else {
    el.primaryOldLabel.style.display = 'none';
    if (m.primary.note) {
      el.productNote.style.display = '';
      el.productNoteText.textContent = m.primary.note;
    } else {
      el.productNote.style.display = 'none';
    }
  }

  if(m.insight&&m.branch==='iphone'){ el.insightWrap.style.display=''; el.insightText.textContent=m.insight; }
  else el.insightWrap.style.display='none';

  el.altName.textContent=m.alt.name;
  el.altPrice.textContent=m.alt.price;
  el.altDiff.textContent=m.alt.diff;
  
  if(m.alt.isOld) {
    el.altOldLabel.style.display = 'block';
    el.altOldBadge.style.display = 'block';
  } else {
    el.altOldLabel.style.display = 'none';
    el.altOldBadge.style.display = 'none';
  }

  el.accessoryGrid.innerHTML=(m.accessories||[]).slice(0,3).map(a=>
    `<div class="card mini"><p class="miniTitle">${esc(a.n)}</p><p class="miniDesc">${esc(a.w)}</p></div>`
  ).join('');

  if(el.thPrimary) el.thPrimary.textContent=m.primary.name;
  if(el.thAlt) el.thAlt.textContent=m.alt.name;
  el.compareBody.innerHTML=(m.compareFields||[]).map(f=>{
    const r=m.compare[f]||['—','—'];
    return `<tr><td><strong>${esc(f)}</strong></td><td>${r[0]}</td><td>${r[1]}</td></tr>`;
  }).join('');

  state.compareOpen=false; el.compareWrap.classList.remove('open');
  el.btnCompare.textContent='对比主推 vs 备选';
  el.btnStore.onclick=()=>window.open(m.storeUrl,'_blank');
}

function buildSaveText(m){
  const pTag = m.primary.isOld ? '【历史官方参考价 / 当前 Apple Store 已下架】' : '';
  const aTag = m.alt.isOld ? '【历史官方参考价 / 当前 Apple Store 已下架】' : '';
  return `【Help Me Choose 推荐摘要】\n\n主推：${m.primary.name} ${pTag}（${m.primary.price}）\n备选：${m.alt.name} ${aTag}（${m.alt.price}）\n\n${m.why}\n\n搭配推荐：${(m.accessories||[]).map(a=>a.n).join('、')}\n\n────────────\n在 Apple Store 查看：${m.storeUrl}`;
}

// ══ Events ═══════════════════════════════════════════════════
el.btnStart.addEventListener('click',()=>{ renderQ1(); showScreen('q1'); });

el.btnCompare.addEventListener('click',()=>{
  state.compareOpen=!state.compareOpen;
  el.compareWrap.classList.toggle('open',state.compareOpen);
  el.btnCompare.textContent=state.compareOpen?'收起对比':'对比主推 vs 备选';
});

el.btnSave.addEventListener('click',()=>{
  if(!state.matched)return;
  el.saveText.value=buildSaveText(state.matched);
  el.modalOverlay.classList.add('show');
  setTimeout(()=>{ el.saveText.focus(); el.saveText.select(); },50);
});

el.linkRestart.addEventListener('click',e=>{
  e.preventDefault();
  state.branch=null; state.answers={q1:null,q2:null,q3:null,q4:null};
  state.compareOpen=false; state.matched=null;
  el.compareWrap.classList.remove('open'); showScreen('welcome');
});

el.btnCloseModal.addEventListener('click',()=>el.modalOverlay.classList.remove('show'));
el.modalOverlay.addEventListener('click',e=>{ if(e.target===el.modalOverlay)el.modalOverlay.classList.remove('show'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')el.modalOverlay.classList.remove('show'); });
el.btnSelectAll.addEventListener('click',()=>{ el.saveText.focus(); el.saveText.select(); });
el.btnCopy.addEventListener('click',async()=>{
  try{ await navigator.clipboard.writeText(el.saveText.value); }
  catch{ el.saveText.focus(); el.saveText.select(); document.execCommand('copy'); }
  el.btnCopy.textContent='已复制 ✓';
  setTimeout(()=>el.btnCopy.textContent='复制摘要',1200);
});

// Init
showScreen('welcome');
})();
</script>
</body>
</html>
