<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Me Choose</title>
  <style>
    :root{
      --bg:#FFFFFF;
      --text:#1D1D1F;
      --muted:#6E6E73;
      --gray:#F5F5F7;
      --blue:#0071E3;
      --border: rgba(0,0,0,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow-soft: 0 6px 18px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{color:inherit}
    .app{
      min-height:100%;
      display:flex;
      justify-content:center;
      padding:20px 14px 40px;
    }
    .shell{
      width:100%;
      max-width: 560px;
      margin:0 auto;
    }
    .top{
      position:sticky;
      top:0;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding:12px 0 10px;
      z-index:10;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 0 6px 10px;
    }
    .brand .name{
      font-weight:600;
      letter-spacing:.2px;
      font-size:14px;
      color: rgba(29,29,31,.9);
    }
    .brand .chip{
      font-size:12px;
      color: var(--muted);
      background: var(--gray);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .progress{
      height: 6px;
      background: rgba(0,0,0,.06);
      border-radius: 999px;
      overflow:hidden;
      margin: 0 6px;
    }
    .progress > div{
      height:100%;
      width:0%;
      background: var(--blue);
      border-radius:999px;
      transition: width .35s ease;
    }
    .stage{
      position:relative;
      padding-top: 10px;
    }
    .screen{
      display:none;
      opacity:0;
      transform: translateY(6px);
      transition: opacity .3s ease, transform .3s ease;
      padding: 12px 6px 0;
    }
    .screen.active{
      display:block;
    }
    .screen.visible{
      opacity:1;
      transform: translateY(0);
    }
    .screen.result-animate{
      transform: translateY(18px);
      transition: opacity .3s ease, transform .4s ease;
    }

    h1{
      margin: 8px 0 10px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: -0.02em;
    }
    h2{
      margin: 6px 0 10px;
      font-size: 22px;
      letter-spacing: -0.01em;
    }
    p{
      margin: 0 0 18px;
      color: var(--muted);
      line-height:1.55;
    }

    .cardGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .card{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px;
      box-shadow: var(--shadow-soft);
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: rgba(0,0,0,.12);
    }
    .card:active{
      transform: translateY(0);
      box-shadow: var(--shadow-soft);
    }
    .cardTitle{
      font-weight:700;
      font-size: 18px;
      letter-spacing: -0.01em;
      margin: 0 0 6px;
    }
    .cardDesc{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .cardMeta{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(29,29,31,.85);
      background: var(--gray);
      border: 1px solid var(--border);
      white-space:nowrap;
    }
    .arrow{
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,113,227,.10);
      color: var(--blue);
      border:1px solid rgba(0,113,227,.18);
      flex: 0 0 auto;
    }

    .hero{
      background: linear-gradient(180deg, rgba(245,245,247,.9), rgba(255,255,255,1));
      border:1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 20px 16px;
      box-shadow: var(--shadow-soft);
    }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 14px;
    }
    .btn{
      height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .2px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btnPrimary{
      background: var(--blue);
      color:#fff;
      box-shadow: 0 10px 24px rgba(0,113,227,.18);
    }
    .btnPrimary:hover{box-shadow: 0 12px 28px rgba(0,113,227,.22)}
    .btnSecondary{
      background: #fff;
      color: var(--text);
      border-color: rgba(0,0,0,.14);
      box-shadow: var(--shadow-soft);
    }
    .btnSecondary:hover{border-color: rgba(0,0,0,.18); box-shadow: var(--shadow)}
    .btnGhost{
      background: transparent;
      color: var(--text);
      border-color: rgba(0,0,0,.10);
    }
    .btnGhost:hover{border-color: rgba(0,0,0,.16); background: rgba(0,0,0,.02)}
    .btnFull{flex:1 1 180px}

    .resultHeader{
      display:flex;
      flex-direction:column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .resultStack{
      display:grid;
      gap: 12px;
    }
    .bigCard{
      padding: 18px 16px;
    }
    .bigTitle{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom: 10px;
    }
    .productName{
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin:0;
    }
    .price{
      font-size: 14px;
      font-weight: 700;
      color: rgba(29,29,31,.86);
      background: var(--gray);
      border:1px solid var(--border);
      padding: 8px 10px;
      border-radius: 999px;
      white-space:nowrap;
    }
    .bullets{
      margin: 10px 0 0;
      padding-left: 18px;
      color: rgba(29,29,31,.88);
      line-height:1.6;
      font-size: 14px;
    }
    .why{
      margin-top: 12px;
      padding: 12px 12px;
      background: rgba(0,113,227,.06);
      border: 1px solid rgba(0,113,227,.14);
      border-radius: 14px;
      color: rgba(29,29,31,.9);
      line-height:1.55;
      font-size: 14px;
    }
    .subCards{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .mini{
      padding: 14px 14px;
      box-shadow: none;
      cursor: default;
    }
    .mini:hover{transform:none; box-shadow:none}
    .miniTitle{
      margin:0;
      font-weight: 800;
      letter-spacing:-0.01em;
      font-size: 15px;
    }
    .miniDesc{
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .miniFooter{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .sectionTitle{
      margin: 18px 0 10px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing:-0.01em;
      color: rgba(29,29,31,.92);
    }
    .compareWrap{
      overflow:hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      transition: max-height .35s ease, opacity .25s ease, transform .25s ease;
    }
    .compareWrap.open{
      opacity: 1;
      transform: translateY(0);
      max-height: 800px;
    }
    table{
      width:100%;
      border-collapse: collapse;
      overflow:hidden;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background:#fff;
      box-shadow: var(--shadow-soft);
    }
    th,td{
      text-align:left;
      padding: 12px 12px;
      border-bottom:1px solid rgba(0,0,0,.06);
      vertical-align: top;
      font-size: 13px;
      line-height:1.45;
    }
    th{
      background: var(--gray);
      font-weight: 800;
      letter-spacing:-0.01em;
      color: rgba(29,29,31,.9);
    }
    tr:last-child td{border-bottom:none}
    .footerLink{
      margin-top: 18px;
      display:inline-block;
      color: rgba(0,113,227,.95);
      text-decoration:none;
      font-weight:600;
      padding: 8px 4px;
    }
    .footerLink:hover{text-decoration: underline}

    .modalOverlay{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 100;
    }
    .modalOverlay.show{display:flex}
    .modal{
      width:100%;
      max-width: 520px;
      background:#fff;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 24px 70px rgba(0,0,0,.25);
      overflow:hidden;
      transform: translateY(10px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
    }
    .modalOverlay.show .modal{
      transform: translateY(0);
      opacity: 1;
    }
    .modalHead{
      padding: 14px 16px;
      background: rgba(245,245,247,.92);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .modalTitle{
      font-weight:800;
      letter-spacing:-0.01em;
      font-size: 14px;
      margin:0;
    }
    .iconBtn{
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.10);
      background: #fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: background .12s ease, border-color .12s ease;
    }
    .iconBtn:hover{background: rgba(0,0,0,.02); border-color: rgba(0,0,0,.14)}
    .modalBody{
      padding: 14px 16px 16px;
    }
    .textarea{
      width:100%;
      min-height: 120px;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      font-size: 13px;
      line-height:1.55;
      color: rgba(29,29,31,.92);
      resize: vertical;
      outline:none;
    }
    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height:1.45;
    }

    @media (min-width: 740px){
      .app{padding: 28px 18px 60px}
      .cardGrid{grid-template-columns: 1fr 1fr 1fr}
      .subCards{grid-template-columns: 1fr 1fr}
      h1{font-size: 40px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell" role="application" aria-label="Help Me Choose">
      <div class="top" aria-hidden="false">
        <div class="brand">
          <div class="name">Help Me Choose</div>
          <div class="chip" id="chipStatus">准备开始</div>
        </div>
        <div class="progress" aria-label="进度">
          <div id="progressBar"></div>
        </div>
      </div>

      <main class="stage">
        <section class="screen" id="screen-welcome" aria-label="欢迎页">
          <div class="hero">
            <h1>Help Me Choose</h1>
            <p>告诉我你想买什么，我来帮你选对款</p>
            <div class="btnRow">
              <button class="btn btnPrimary btnFull" id="btnStart">开始选购</button>
            </div>
          </div>
        </section>

        <section class="screen" id="screen-q1" aria-label="Q1">
          <h2>你现在更想买哪类产品？</h2>
          <p>选一个方向，我们用 3 个问题把范围收敛到更合适的推荐。</p>
          <div class="cardGrid" id="q1Grid"></div>
        </section>

        <section class="screen" id="screen-q2" aria-label="Q2">
          <h2 id="q2Title"></h2>
          <p id="q2Hint"></p>
          <div class="cardGrid" id="q2Grid"></div>
        </section>

        <section class="screen" id="screen-q3" aria-label="Q3">
          <h2 id="q3Title"></h2>
          <p id="q3Hint"></p>
          <div class="cardGrid" id="q3Grid"></div>
        </section>

        <section class="screen" id="screen-q4" aria-label="Q4">
          <h2 id="q4Title"></h2>
          <p id="q4Hint"></p>
          <div class="cardGrid" id="q4Grid"></div>
        </section>

        <section class="screen result-animate" id="screen-result" aria-label="推荐结果页">
          <div class="resultHeader">
            <h2 style="margin:0">这是为你挑选的推荐</h2>
            <p id="resultSub" style="margin:0">基于你的选择，我们为你整理了更适合的主推、备选与配件建议。</p>
          </div>

          <div class="resultStack">
            <div class="card bigCard" id="primaryCard" style="cursor:default">
              <div class="bigTitle">
                <div>
                  <p class="pill" id="reasonTag" style="margin:0 0 10px; display:inline-flex"></p>
                  <p class="productName" id="primaryName"></p>
                </div>
                <div class="price" id="primaryPrice"></div>
              </div>
              <ul class="bullets" id="primaryBullets"></ul>
              <div class="why" id="primaryWhy"></div>
            </div>

            <div>
              <div class="sectionTitle">备选款</div>
              <div class="subCards">
                <div class="card mini" id="altCard" aria-label="备选款">
                  <p class="miniTitle" id="altName"></p>
                  <p class="miniDesc" id="altDiff"></p>
                  <div class="miniFooter">
                    <span class="pill">备选价格</span>
                    <span class="price" id="altPrice"></span>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div class="sectionTitle">主推款配件推荐</div>
              <div class="subCards" id="accessoryGrid"></div>
            </div>

            <div>
              <div class="sectionTitle">下一步</div>
              <div class="btnRow">
                <button class="btn btnPrimary btnFull" id="btnStore">在 Apple Store 查看</button>
                <button class="btn btnSecondary btnFull" id="btnCompare">对比主推 vs 备选</button>
                <button class="btn btnGhost btnFull" id="btnSave">保存这套推荐</button>
              </div>
            </div>

            <div class="compareWrap" id="compareWrap" aria-label="对比表">
              <div style="height:10px"></div>
              <table id="compareTable">
                <thead>
                  <tr>
                    <th id="thItem" style="width:26%">项目</th>
                    <th id="thPrimary" style="width:37%">主推</th>
                    <th id="thAlt" style="width:37%">备选</th>
                  </tr>
                </thead>
                <tbody id="compareBody"></tbody>
              </table>
            </div>

            <a class="footerLink" href="#" id="linkRestart">重新来过</a>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="保存推荐摘要">
    <div class="modal">
      <div class="modalHead">
        <p class="modalTitle">可复制的推荐摘要</p>
        <button class="iconBtn" id="btnCloseModal" aria-label="关闭">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="modalBody">
        <textarea class="textarea" id="saveText" readonly></textarea>
        <div class="btnRow" style="margin-top:12px">
          <button class="btn btnPrimary btnFull" id="btnCopy">复制摘要</button>
          <button class="btn btnSecondary btnFull" id="btnSelectAll">全选</button>
        </div>
        <p class="hint">提示：你也可以直接长按文本进行复制。</p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const $ = (sel) => document.querySelector(sel);
      const el = {
        chipStatus: $("#chipStatus"),
        progressBar: $("#progressBar"),
        screens: {
          welcome: $("#screen-welcome"),
          q1: $("#screen-q1"),
          q2: $("#screen-q2"),
          q3: $("#screen-q3"),
          q4: $("#screen-q4"),
          result: $("#screen-result"),
        },
        btnStart: $("#btnStart"),
        q1Grid: $("#q1Grid"),
        q2Title: $("#q2Title"),
        q2Hint: $("#q2Hint"),
        q2Grid: $("#q2Grid"),
        q3Title: $("#q3Title"),
        q3Hint: $("#q3Hint"),
        q3Grid: $("#q3Grid"),
        q4Title: $("#q4Title"),
        q4Hint: $("#q4Hint"),
        q4Grid: $("#q4Grid"),
        resultSub: $("#resultSub"),
        reasonTag: $("#reasonTag"),
        primaryName: $("#primaryName"),
        primaryPrice: $("#primaryPrice"),
        primaryBullets: $("#primaryBullets"),
        primaryWhy: $("#primaryWhy"),
        altName: $("#altName"),
        altDiff: $("#altDiff"),
        altPrice: $("#altPrice"),
        accessoryGrid: $("#accessoryGrid"),
        btnStore: $("#btnStore"),
        btnCompare: $("#btnCompare"),
        compareWrap: $("#compareWrap"),
        compareBody: $("#compareBody"),
        thPrimary: $("#thPrimary"),
        thAlt: $("#thAlt"),
        btnSave: $("#btnSave"),
        linkRestart: $("#linkRestart"),
        modalOverlay: $("#modalOverlay"),
        btnCloseModal: $("#btnCloseModal"),
        saveText: $("#saveText"),
        btnCopy: $("#btnCopy"),
        btnSelectAll: $("#btnSelectAll"),
      };

      const state = {
        step: "welcome", // welcome | q1 | q2 | q3 | q4 | result
        branch: null, // iphone | macbook | airpods
        answers: { q1: null, q2: null, q3: null, q4: null },
        compareOpen: false,
        matched: null, // { primary, alt, accessories, compareFields, reasonTag, diff, why }
      };

      const BUDGET_TILTS = {
        title: "你的预算倾向更像哪种？",
        hint: "这会直接影响我们推荐更克制、均衡，还是一步到位的路线。",
        options: ["控制预算，够用就好", "预算中间档，想买得均衡", "愿意多花一点，换更完整体验", "预算基本不设限，想一步到位"],
      };

      const PRODUCTS = {
        iphone: {
          label: "iPhone",
          desc: "想换一台更适合你的手机",
          q3: {
            title: "你平时最主要怎么用手机？",
            hint: "选你最常发生的使用方式，我们会把预算倾向一起纳入推荐。",
            options: ["日常使用 / 社交 / 拍照", "长时间刷视频 / 续航重度使用", "内容创作 / 拍照拍视频", "希望手机一步到位，用很多年"],
          },
          q4: {
            title: "你更在意什么？",
            hint: "这是最后一步，用来在同预算路线里做更精确的取舍。",
            options: ["性价比", "均衡体验", "拍照能力", "旗舰感和完整体验"],
          },
          compareFields: ["价格", "屏幕尺寸", "芯片", "相机能力", "存储版本", "电池/续航", "适合人群"],
          rules: [
            {
              id: "ip-tilt-budget",
              match: { tilt: "控制预算，够用就好", scene: "*", pref: "*" },
              primary: {
                name: "iPhone 15 128GB",
                price: "RMB 4999 起",
                bullets: ["价格更克制，日常社交与拍照完全够用", "成熟稳定的整体体验，入手更安心", "把预算留给你更常用的配件或服务"],
              },
              alt: {
                name: "iPhone 16 128GB",
                price: "RMB 5999 起",
                diff: "如果你希望更新一代体验与更长线使用，可以上到 iPhone 16 标准版",
              },
              tag: "控制预算",
              accessories: [
                { name: "透明 MagSafe 壳", why: "保护机身同时保留原本配色，日常更安心" },
                { name: "编织数据线", why: "更耐用也更顺手，让充电与桌面使用更舒适" },
              ],
              compare: {
                "价格": ["RMB 4999 起", "RMB 5999 起"],
                "屏幕尺寸": ["日常均衡尺寸", "日常均衡尺寸"],
                "芯片": ["上一代旗舰芯片", "A18（更新一代）"],
                "相机能力": ["依旧优秀，更偏性价比", "4800 万主摄，日常更清晰"],
                "存储版本": ["128GB", "128GB"],
                "电池/续航": ["约 3300 mAh｜日常够用，整体更克制", "约 3350 mAh｜续航更从容，适合更长线使用"],
                "适合人群": ["明确想控制预算、够用即可", "愿意为更新一代体验多花一点点"],
              },
            },
            {
              id: "ip-tilt-balanced",
              match: { tilt: "预算中间档，想买得均衡", scene: "*", pref: "*" },
              primary: {
                name: "iPhone 16 256GB",
                price: "RMB 6499 起",
                bullets: ["体验更均衡，适合大多数用户", "256GB 更适合长期使用，不易焦虑", "日常社交、拍照、娱乐都更稳妥"],

                price: "RMB 3999 起",
                diff: "如果你更偏爱头戴式沉浸体验，且主要在桌面长时间听音，可考虑 AirPods Max",
              },
              tag: "一步到位",
              accessories: [
                { name: "AirPods 保护壳", why: "日常收纳与携带更安心，减少刮蹭" },
                { name: "无线充电底座", why: "桌面补能更方便，随手一放更省心" },
              ],
              compare: {
                "价格": ["RMB 1899 起", "RMB 3999 起"],
                "佩戴形式": ["入耳式", "头戴式"],
                "降噪能力": ["强", "强（更沉浸）"],
                "电池/续航": ["单次约 6 小时｜含充电盒约 30 小时", "单次约 20 小时｜不含盒（头戴式长听）"],
                "连接场景": ["通勤/办公/日常都合适", "更适合固定场景长听"],
                "音质定位": ["均衡 + 空间音频", "更沉浸、更厚实"],
                "适合人群": ["想要完整体验的一副", "预算充足、追求包耳沉浸"],
              },
            },
          ],
        },
      };

      const COPY = {
        steps: {
          welcome: { progress: 0, chip: "准备开始" },
          q1: { progress: 25, chip: "第 1/4 步" },
          q2: { progress: 50, chip: "第 2/4 步" },
          q3: { progress: 75, chip: "第 3/4 步" },
          q4: { progress: 100, chip: "第 4/4 步" },
          result: { progress: 100, chip: "推荐已生成" },
        },
        whyTemplates: [],
      };

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setProgress(stepKey) {
        const info = COPY.steps[stepKey] || COPY.steps.welcome;
        el.progressBar.style.width = info.progress + "%";
        el.chipStatus.textContent = info.chip;
      }

      function showScreen(key, { isResult = false } = {}) {
        state.step = key;
        setProgress(key);

        Object.entries(el.screens).forEach(([k, node]) => {
          if (!node) return;
          if (k === key) {
            node.classList.add("active");
          } else {
            node.classList.remove("visible");
            node.classList.remove("active");
          }
        });

        const node = el.screens[key];
        if (!node) return;
        if (isResult) node.classList.add("result-animate");
        requestAnimationFrame(() => {
          node.classList.add("visible");
          if (isResult) {
            requestAnimationFrame(() => node.classList.remove("result-animate"));
          }
        });
      }

      function card({ title, desc, meta }) {
        const metaLeft = meta?.left ? `<span class="pill">${escapeHtml(meta.left)}</span>` : `<span class="pill">轻点选择</span>`;
        const metaRight = `<span class="arrow" aria-hidden="true">→</span>`;
        return `
          <div class="card" role="button" tabindex="0" aria-label="${escapeHtml(title)}">
            <div class="cardTitle">${escapeHtml(title)}</div>
            <p class="cardDesc">${escapeHtml(desc || "")}</p>
            <div class="cardMeta">
              ${metaLeft}
              ${metaRight}
            </div>
          </div>
        `;
      }

      function wireCardActivate(container, onPick) {
        // 覆盖式绑定，避免多次 render 叠加监听器
        container.onclick = (e) => {
          const c = e.target.closest(".card");
          if (!c || !container.contains(c)) return;
          const idx = [...container.querySelectorAll(".card")].indexOf(c);
          if (idx >= 0) onPick(idx);
        };
        container.onkeydown = (e) => {
          if (e.key !== "Enter" && e.key !== " ") return;
          const c = e.target.closest(".card");
          if (!c || !container.contains(c)) return;
          e.preventDefault();
          const idx = [...container.querySelectorAll(".card")].indexOf(c);
          if (idx >= 0) onPick(idx);
        };
      }

      function renderQ1() {
        const items = [
          { key: "iphone", label: PRODUCTS.iphone.label, desc: PRODUCTS.iphone.desc },
          { key: "macbook", label: PRODUCTS.macbook.label, desc: PRODUCTS.macbook.desc },
          { key: "airpods", label: PRODUCTS.airpods.label, desc: PRODUCTS.airpods.desc },
        ];
        el.q1Grid.innerHTML = items
          .map((x) =>
            card({
              title: x.label,
              desc: x.desc,
              meta: { left: "选择品类" },
            })
          )
          .join("");

        wireCardActivate(el.q1Grid, (idx) => {
          const picked = items[idx];
          if (!picked) return;
          state.branch = picked.key;
          state.answers.q1 = picked.label;
          state.answers.q2 = null;
          state.answers.q3 = null;
          state.answers.q4 = null;
          state.compareOpen = false;
          el.compareWrap.classList.remove("open");
          renderQ2();
          showScreen("q2");
        });
      }

      function renderQ2() {
        el.q2Title.textContent = BUDGET_TILTS.title;
        el.q2Hint.textContent = BUDGET_TILTS.hint;
        el.q2Grid.innerHTML = BUDGET_TILTS.options
          .map((opt) =>
            card({
              title: opt,
              desc: opt.includes("控制预算")
                ? "更偏入门/性价比路线，不为用不到的能力多花钱。"
                : opt.includes("均衡")
                  ? "更偏主流稳妥款，体验更均衡、长期更踏实。"
                  : opt.includes("更完整")
                    ? "更偏中高配，把体验补齐得更完整。"
                    : "更偏高配/一步到位路线，减少后悔成本。",
              meta: { left: "单选" },
            })
          )
          .join("");

        wireCardActivate(el.q2Grid, (idx) => {
          const val = BUDGET_TILTS.options[idx];
          state.answers.q2 = val;
          renderQ3();
          showScreen("q3");
        });
      }

      function renderQ3() {
        const b = PRODUCTS[state.branch];
        el.q3Title.textContent = b.q3.title;
        el.q3Hint.textContent = b.q3.hint;
        el.q3Grid.innerHTML = b.q3.options
          .map((opt) =>
            card({
              title: opt,
              desc: "我们会把你的预算倾向一起纳入推荐，避免总是推同一个答案。",
              meta: { left: "单选" },
            })
          )
          .join("");

        wireCardActivate(el.q3Grid, (idx) => {
          const val = b.q3.options[idx];
          state.answers.q3 = val;
          renderQ4();
          showScreen("q4");
        });
      }

      function renderQ4() {
        const b = PRODUCTS[state.branch];
        el.q4Title.textContent = b.q4.title;
        el.q4Hint.textContent = b.q4.hint;
        el.q4Grid.innerHTML = b.q4.options
          .map((opt) =>
            card({
              title: opt,
              desc: "最后一步：用来在同一预算路线里做更精确的取舍。",
              meta: { left: "单选" },
            })
          )
          .join("");

        wireCardActivate(el.q4Grid, (idx) => {
          const val = b.q4.options[idx];
          state.answers.q4 = val;
          const matched = matchRecommendation();
          state.matched = matched;
          renderResult(matched);
          showScreen("result", { isResult: true });
          setProgress("result");
        });
      }

      function normalizeMatchValue(v) {
        if (v === "*") return { any: true, list: null, value: null };
        if (Array.isArray(v)) return { any: false, list: v, value: null };
        return { any: false, list: null, value: v };
      }

      function ruleScore(rule) {
        // More specific wins; V3: tilt（预算倾向）权重更高，避免被其它条件“反客为主”
        const m = rule.match || {};
        let score = 0;
        Object.entries(m).forEach(([k, v]) => {
          const n = normalizeMatchValue(v);
          const isTilt = k === "tilt";
          if (n.any) score += 0;
          else if (n.list) score += isTilt ? 2 : 1;
          else score += isTilt ? 4 : 2;
        });
        return score;
      }

      function matchRecommendation() {
        const branchKey = state.branch;
        const b = PRODUCTS[branchKey];
        const tilt = state.answers.q2;
        const q3 = state.answers.q3;
        const q4 = state.answers.q4;

        const ctx = {
          branch: branchKey,
          tilt,
          q3,
          q4,
        };

        const rules = b.rules.slice();
        const candidates = [];

        for (const r of rules) {
          const m = r.match || {};
          let ok = true;

          if (branchKey === "iphone") {
            const nt = normalizeMatchValue(m.tilt ?? "*");
            const ns = normalizeMatchValue(m.scene ?? "*");
            const np = normalizeMatchValue(m.pref ?? "*");
            if (!nt.any && nt.value && nt.value !== tilt) ok = false;
            if (!nt.any && nt.list && !nt.list.includes(tilt)) ok = false;
            if (!ns.any && ns.value && ns.value !== q3) ok = false;
            if (!ns.any && ns.list && !ns.list.includes(q3)) ok = false;
            if (!np.any && np.value && np.value !== q4) ok = false;
            if (!np.any && np.list && !np.list.includes(q4)) ok = false;
          } else if (branchKey === "macbook") {
            const nt = normalizeMatchValue(m.tilt ?? "*");
            const nu = normalizeMatchValue(m.usage ?? "*");
            const np = normalizeMatchValue(m.pref ?? "*");
            if (!nt.any && nt.value && nt.value !== tilt) ok = false;
            if (!nt.any && nt.list && !nt.list.includes(tilt)) ok = false;
            if (!nu.any && nu.value && nu.value !== q3) ok = false;
            if (!nu.any && nu.list && !nu.list.includes(q3)) ok = false;
            if (!np.any && np.value && np.value !== q4) ok = false;
            if (!np.any && np.list && !np.list.includes(q4)) ok = false;
          } else {
            const nt = normalizeMatchValue(m.tilt ?? "*");
            const ns = normalizeMatchValue(m.scene ?? "*");
            const np = normalizeMatchValue(m.pref ?? "*");
            if (!nt.any && nt.value && nt.value !== tilt) ok = false;
            if (!nt.any && nt.list && !nt.list.includes(tilt)) ok = false;
            if (!ns.any && ns.value && ns.value !== q3) ok = false;
            if (!ns.any && ns.list && !ns.list.includes(q3)) ok = false;
            if (!np.any && np.value && np.value !== q4) ok = false;
            if (!np.any && np.list && !np.list.includes(q4)) ok = false;
          }

          if (ok) candidates.push(r);
        }

        candidates.sort((a, b2) => ruleScore(b2) - ruleScore(a));
        const picked = candidates[0] || b.rules[0];

        const why = buildWhy(ctx, picked);

        return {
          branch: branchKey,
          tilt,
          q3,
          q4,
          primary: picked.primary,
          alt: picked.alt,
          tag: picked.tag,
          accessories: picked.accessories || [],
          compareFields: b.compareFields,
          compare: picked.compare || {},
          why,
        };
      }

      function buildWhy(ctx, pickedRule) {
        const tilt = ctx.tilt;
        const budgetLine =
          tilt === "控制预算，够用就好"
            ? "因为你选择了「控制预算，够用就好」，我们优先推荐更克制、满足日常即可的路线，不为用不到的能力多花钱。"
            : tilt === "预算中间档，想买得均衡"
              ? "因为你选择了「预算中间档，想买得均衡」，我们优先推荐更主流稳妥的路线，让体验、价格与长线使用更平衡。"
              : tilt === "愿意多花一点，换更完整体验"
                ? "因为你愿意「多花一点换更完整体验」，我们优先把关键体验补齐，让整体使用更完整、更少妥协。"
                : "因为你希望「一步到位」，我们优先考虑更完整的高配路线，减少后悔成本。";

        const s = ctx.q3 ? `你主要场景是「${ctx.q3}」` : "";
        const p = ctx.q4 ? `更在意「${ctx.q4}」` : "";
        const tail = [s, p].filter(Boolean).join("，");
        return `${budgetLine}${tail ? `同时你${tail}，因此 ${pickedRule.primary.name} 更贴合你的优先级。` : `因此 ${pickedRule.primary.name} 更贴合你的优先级。`}`;
      }

      function renderResult(m) {
        el.resultSub.textContent = buildResultSubtitle(m);
        el.reasonTag.textContent = m.tag ? `推荐理由：${m.tag}` : "推荐理由";
        el.primaryName.textContent = m.primary.name;
        el.primaryPrice.textContent = m.primary.price;
        el.primaryBullets.innerHTML = (m.primary.bullets || []).map((x) => `<li>${escapeHtml(x)}</li>`).join("");
        el.primaryWhy.textContent = m.why;

        el.altName.textContent = m.alt.name;
        el.altPrice.textContent = m.alt.price;
        el.altDiff.textContent = m.alt.diff;

        el.accessoryGrid.innerHTML = (m.accessories || [])
          .slice(0, 3)
          .map((a) => {
            return `
              <div class="card mini" aria-label="配件推荐">
                <p class="miniTitle">${escapeHtml(a.name)}</p>
                <p class="miniDesc">${escapeHtml(a.why)}</p>
              </div>
            `;
          })
          .join("");

        renderCompare(m);
        state.compareOpen = false;
        el.compareWrap.classList.remove("open");
        el.btnCompare.textContent = "对比主推 vs 备选";
      }

      function buildResultSubtitle(m) {
        const branchLabel = PRODUCTS[m.branch]?.label || "产品";
        if (m.branch === "iphone") {
          return `基于你想选购的 ${branchLabel} 与你的偏好，我们为你整理了更适合的主推、备选与配件建议。`;
        }
        if (m.branch === "macbook") {
          return `基于你的使用场景与取向，我们为你整理了更适合的 ${branchLabel} 主推、备选与配件建议。`;
        }
        return `基于你的选择，我们为你整理了更适合的 ${branchLabel} 主推、备选与配件建议。`;
      }

      function renderCompare(m) {
        if (el.thPrimary) el.thPrimary.textContent = m.primary?.name || "主推";
        if (el.thAlt) el.thAlt.textContent = m.alt?.name || "备选";
        const fields = m.compareFields || [];
        el.compareBody.innerHTML = fields
          .map((f) => {
            const row = m.compare?.[f] || ["—", "—"];
            const left = row[0] ?? "—";
            const right = row[1] ?? "—";
            return `
              <tr>
                <td><strong>${escapeHtml(f)}</strong></td>
                <td>${escapeHtml(left)}</td>
                <td>${escapeHtml(right)}</td>
              </tr>
            `;
          })
          .join("");
      }

      function openModal(text) {
        el.saveText.value = text;
        el.modalOverlay.classList.add("show");
        setTimeout(() => {
          el.saveText.focus();
          el.saveText.select();
        }, 50);
      }

      function closeModal() {
        el.modalOverlay.classList.remove("show");
      }

      function buildSaveSummary(m) {
        return `我在 Help Me Choose 中得到了推荐：${m.primary.name}（${m.primary.price}）。因为我选择了「${m.tilt}」，主要场景是「${m.q3}」，更在意「${m.q4}」，所以更适合这条路线。备选是 ${m.alt.name}（${m.alt.price}）。推荐搭配 ${m.accessories.map((x) => x.name).slice(0, 3).join(" 和 ")}。`;
      }

      function resetAll() {
        state.step = "welcome";
        state.branch = null;
        state.answers = { q1: null, q2: null, q3: null, q4: null };
        state.compareOpen = false;
        state.matched = null;
        el.compareWrap.classList.remove("open");
        showScreen("welcome");
        setProgress("welcome");
      }

      // Bind actions
      el.btnStart.addEventListener("click", () => {
        renderQ1();
        showScreen("q1");
      });

      el.btnStore.addEventListener("click", () => {
        alert("这里是 Apple Store 查看按钮占位。你可以在正式版本里替换为真实链接。");
      });

      el.btnCompare.addEventListener("click", () => {
        state.compareOpen = !state.compareOpen;
        el.compareWrap.classList.toggle("open", state.compareOpen);
        el.btnCompare.textContent = state.compareOpen ? "收起对比" : "对比主推 vs 备选";
      });

      el.btnSave.addEventListener("click", () => {
        if (!state.matched) return;
        openModal(buildSaveSummary(state.matched));
      });

      el.linkRestart.addEventListener("click", (e) => {
        e.preventDefault();
        resetAll();
      });

      el.btnCloseModal.addEventListener("click", closeModal);
      el.modalOverlay.addEventListener("click", (e) => {
        if (e.target === el.modalOverlay) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && el.modalOverlay.classList.contains("show")) closeModal();
      });

      el.btnSelectAll.addEventListener("click", () => {
        el.saveText.focus();
        el.saveText.select();
      });

      el.btnCopy.addEventListener("click", async () => {
        const text = el.saveText.value;
        try {
          await navigator.clipboard.writeText(text);
          el.btnCopy.textContent = "已复制";
          setTimeout(() => (el.btnCopy.textContent = "复制摘要"), 900);
        } catch {
          el.saveText.focus();
          el.saveText.select();
          document.execCommand("copy");
          el.btnCopy.textContent = "已复制";
          setTimeout(() => (el.btnCopy.textContent = "复制摘要"), 900);
        }
      });

      // Init
      setProgress("welcome");
      showScreen("welcome");
    })();
  </script>
</body>
</html>
